version: v2
managed:
  enabled: true
  override:
    - file_option: go_package
      value: github.com/valon-technologies/gestalt/sdk/go/gen/v1;proto
plugins:
  # Go messages
  - remote: buf.build/protocolbuffers/go
    out: ../go/gen
    opt:
      - paths=source_relative

  # Go gRPC stubs
  - remote: buf.build/grpc/go
    out: ../go/gen
    opt:
      - paths=source_relative

  # TypeScript (ts-proto generates both messages and gRPC client/server code)
  - remote: buf.build/community/timostamm-protobuf-ts
    out: ../typescript/gen
    opt:
      - long_type_string

  # Python messages + gRPC stubs
  - remote: buf.build/protocolbuffers/python
    out: ../python/gen
  - remote: buf.build/grpc/python
    out: ../python/gen
