syntax = "proto3";

package gestalt.provider.v1;

option go_package = "github.com/valon-technologies/gestalt/internal/gen/v1;proto";

// GetSecretRequest looks up one named secret.
message GetSecretRequest {
  string name = 1;
}

// GetSecretResponse returns the secret value.
message GetSecretResponse {
  string value = 1;
}

// SecretsProvider models the shared Gestalt secrets-provider protocol.
service SecretsProvider {
  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse);
}
