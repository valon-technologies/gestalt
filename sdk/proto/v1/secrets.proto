syntax = "proto3";

package gestalt.plugin.v1;

option go_package = "github.com/valon-technologies/gestalt/sdk/go/gen/v1;proto";

message GetSecretRequest {
  string name = 1;
}

message GetSecretResponse {
  string value = 1;
}

service SecretsProvider {
  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse);
}
