syntax = "proto3";

package gestalt.provider.v1;

option go_package = "github.com/valon-technologies/gestalt/internal/gen/v1;proto";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "v1/plugin.proto";

message AgentMessage {
  string role = 1;
  string text = 2;
  repeated AgentMessagePart parts = 3;
  google.protobuf.Struct metadata = 4;
}

enum AgentMessagePartType {
  AGENT_MESSAGE_PART_TYPE_UNSPECIFIED = 0;
  AGENT_MESSAGE_PART_TYPE_TEXT = 1;
  AGENT_MESSAGE_PART_TYPE_JSON = 2;
  AGENT_MESSAGE_PART_TYPE_TOOL_CALL = 3;
  AGENT_MESSAGE_PART_TYPE_TOOL_RESULT = 4;
  AGENT_MESSAGE_PART_TYPE_IMAGE_REF = 5;
}

message AgentMessagePartToolCall {
  string id = 1;
  string tool_id = 2;
  google.protobuf.Struct arguments = 3;
}

message AgentMessagePartToolResult {
  string tool_call_id = 1;
  int32 status = 2;
  string content = 3;
  google.protobuf.Struct output = 4;
}

message AgentMessagePartImageRef {
  string uri = 1;
  string mime_type = 2;
}

message AgentMessagePart {
  AgentMessagePartType type = 1;
  string text = 2;
  google.protobuf.Struct json = 3;
  AgentMessagePartToolCall tool_call = 4;
  AgentMessagePartToolResult tool_result = 5;
  AgentMessagePartImageRef image_ref = 6;
}

message AgentActor {
  string subject_id = 1;
  string subject_kind = 2;
  string display_name = 3;
  string auth_source = 4;
}

message AgentSubjectContext {
  string subject_id = 1;
  string subject_kind = 2;
  string credential_subject_id = 3;
  string display_name = 4;
  string auth_source = 5;
}

message AgentWorkspace {
  repeated AgentWorkspaceGitCheckout checkouts = 1;
  string cwd = 2;
}

message AgentWorkspaceGitCheckout {
  string url = 1;
  string ref = 2;
  string path = 3;
}

message PreparedAgentWorkspace {
  string root = 1;
  string cwd = 2;
}

message ResolvedAgentTool {
  reserved 4;
  reserved "target";

  string id = 1;
  string name = 2;
  string description = 3;
  google.protobuf.Struct parameters_schema = 5;
}

message AgentToolRef {
  reserved 7;
  reserved "credential_mode";

  string plugin = 1;
  string operation = 2;
  string connection = 3;
  string instance = 4;
  string title = 5;
  string description = 6;
  string system = 8;
}

enum AgentToolSourceMode {
  reserved 1;

  AGENT_TOOL_SOURCE_MODE_UNSPECIFIED = 0;
  AGENT_TOOL_SOURCE_MODE_MCP_CATALOG = 2;
}

enum AgentExecutionStatus {
  AGENT_EXECUTION_STATUS_UNSPECIFIED = 0;
  AGENT_EXECUTION_STATUS_PENDING = 1;
  AGENT_EXECUTION_STATUS_RUNNING = 2;
  AGENT_EXECUTION_STATUS_SUCCEEDED = 3;
  AGENT_EXECUTION_STATUS_FAILED = 4;
  AGENT_EXECUTION_STATUS_CANCELED = 5;
  AGENT_EXECUTION_STATUS_WAITING_FOR_INPUT = 6;
}

enum AgentSessionState {
  AGENT_SESSION_STATE_UNSPECIFIED = 0;
  AGENT_SESSION_STATE_ACTIVE = 1;
  AGENT_SESSION_STATE_ARCHIVED = 2;
}

enum AgentInteractionType {
  AGENT_INTERACTION_TYPE_UNSPECIFIED = 0;
  AGENT_INTERACTION_TYPE_APPROVAL = 1;
  AGENT_INTERACTION_TYPE_CLARIFICATION = 2;
  AGENT_INTERACTION_TYPE_INPUT = 3;
}

enum AgentInteractionState {
  AGENT_INTERACTION_STATE_UNSPECIFIED = 0;
  AGENT_INTERACTION_STATE_PENDING = 1;
  AGENT_INTERACTION_STATE_RESOLVED = 2;
  AGENT_INTERACTION_STATE_CANCELED = 3;
}

message AgentProviderCapabilities {
  reserved 8;

  bool streaming_text = 1;
  bool tool_calls = 2;
  bool parallel_tool_calls = 3;
  bool structured_output = 4;
  bool interactions = 5;
  bool resumable_turns = 6;
  bool reasoning_summaries = 7;
  // Provider list APIs can apply non-zero limits and summary projections without
  // hydrating every source record. Providers that set this must order sessions
  // and turns by the relevant newest-first recency fields before applying limit.
  bool bounded_list_hydration = 9;
  repeated AgentToolSourceMode supported_tool_sources = 10;
  bool supports_session_start = 11;
  bool supports_prepared_workspace = 12;
}

message GetAgentProviderCapabilitiesRequest {}

message AgentInteraction {
  string id = 1;
  AgentInteractionType type = 2;
  AgentInteractionState state = 3;
  string title = 4;
  string prompt = 5;
  google.protobuf.Struct request = 6;
  google.protobuf.Struct resolution = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp resolved_at = 9;
  string turn_id = 10;
  string session_id = 11;
}

message AgentSession {
  string id = 1;
  string provider_name = 2;
  string model = 3;
  string client_ref = 4;
  AgentSessionState state = 5;
  google.protobuf.Struct metadata = 6;
  AgentActor created_by = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  google.protobuf.Timestamp last_turn_at = 10;
}

message CreateAgentProviderSessionRequest {
  reserved 6;
  reserved "provider_options";

  string session_id = 1;
  string idempotency_key = 2;
  string model = 3;
  string client_ref = 4;
  google.protobuf.Struct metadata = 5;
  AgentActor created_by = 7;
  AgentSubjectContext subject = 8;
  AgentSessionStartConfig session_start = 9;
  PreparedAgentWorkspace prepared_workspace = 10;
}

message AgentSessionStartConfig {
  repeated AgentSessionStartHook hooks = 1;
}

message AgentSessionStartHook {
  string id = 1;
  string type = 2;
  repeated string command = 3;
  string cwd = 4;
  string timeout = 5;
  map<string, string> env = 6;
  AgentSessionStartHookOutput output = 7;
}

message AgentSessionStartHookOutput {
  bool additional_context = 1;
  bool metadata = 2;
}

message GetAgentProviderSessionRequest {
  string session_id = 1;
  AgentSubjectContext subject = 2;
}

message ListAgentProviderSessionsRequest {
  AgentSubjectContext subject = 1;
  repeated string session_ids = 2;
  AgentSessionState state = 3;
  // When non-zero and bounded_list_hydration is supported, cap results after
  // ordering sessions newest-first by last_turn_at, updated_at, then created_at.
  int32 limit = 4;
  // When true and bounded_list_hydration is supported, omit heavy fields such as
  // metadata unless exact session_ids require direct lookup.
  bool summary_only = 5;
}

message ListAgentProviderSessionsResponse {
  repeated AgentSession sessions = 1;
}

message UpdateAgentProviderSessionRequest {
  string session_id = 1;
  string client_ref = 2;
  AgentSessionState state = 3;
  google.protobuf.Struct metadata = 4;
  AgentSubjectContext subject = 5;
}

message AgentTurn {
  string id = 1;
  string session_id = 2;
  string provider_name = 3;
  string model = 4;
  AgentExecutionStatus status = 5;
  repeated AgentMessage messages = 6;
  string output_text = 7;
  google.protobuf.Struct structured_output = 8;
  string status_message = 9;
  AgentActor created_by = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp started_at = 12;
  google.protobuf.Timestamp completed_at = 13;
  string execution_ref = 14;
}

message AgentTurnDisplay {
  string kind = 1;
  string phase = 2;
  string text = 3;
  string label = 4;
  string ref = 5;
  string parent_ref = 6;
  google.protobuf.Value input = 7;
  google.protobuf.Value output = 8;
  google.protobuf.Value error = 9;
  string action = 10;
  string format = 11;
  string language = 12;
}

message CreateAgentProviderTurnRequest {
  reserved 9, 15;
  reserved "provider_options", "tool_grant";

  string turn_id = 1;
  string session_id = 2;
  string idempotency_key = 3;
  string model = 4;
  repeated AgentMessage messages = 5;
  repeated ResolvedAgentTool tools = 6;
  google.protobuf.Struct response_schema = 7;
  google.protobuf.Struct metadata = 8;
  AgentActor created_by = 10;
  string execution_ref = 11;
  repeated AgentToolRef tool_refs = 12;
  AgentToolSourceMode tool_source = 13;
  AgentSubjectContext subject = 14;
  google.protobuf.Struct model_options = 16;
  string run_grant = 17;
}

message GetAgentProviderTurnRequest {
  string turn_id = 1;
  AgentSubjectContext subject = 2;
}

message ListAgentProviderTurnsRequest {
  string session_id = 1;
  AgentSubjectContext subject = 2;
  repeated string turn_ids = 3;
  AgentExecutionStatus status = 4;
  // When non-zero and bounded_list_hydration is supported, cap results after
  // ordering turns newest-first by created_at.
  int32 limit = 5;
  // When true and bounded_list_hydration is supported, omit heavy fields such as
  // messages, output text, and structured output unless exact turn_ids require
  // direct lookup.
  bool summary_only = 6;
}

message ListAgentProviderTurnsResponse {
  repeated AgentTurn turns = 1;
}

message CancelAgentProviderTurnRequest {
  string turn_id = 1;
  string reason = 2;
  AgentSubjectContext subject = 3;
}

message AgentTurnEvent {
  string id = 1;
  string turn_id = 2;
  int64 seq = 3;
  string type = 4;
  string source = 5;
  string visibility = 6;
  google.protobuf.Struct data = 7;
  google.protobuf.Timestamp created_at = 8;
  AgentTurnDisplay display = 9;
}

message ListAgentProviderTurnEventsRequest {
  string turn_id = 1;
  int64 after_seq = 2;
  int32 limit = 3;
  AgentSubjectContext subject = 4;
}

message ListAgentProviderTurnEventsResponse {
  repeated AgentTurnEvent events = 1;
}

message GetAgentProviderInteractionRequest {
  string interaction_id = 1;
  AgentSubjectContext subject = 2;
}

message ListAgentProviderInteractionsRequest {
  string turn_id = 1;
  AgentSubjectContext subject = 2;
}

message ListAgentProviderInteractionsResponse {
  repeated AgentInteraction interactions = 1;
}

message ResolveAgentProviderInteractionRequest {
  string interaction_id = 1;
  google.protobuf.Struct resolution = 2;
  AgentSubjectContext subject = 3;
}

message ExecuteAgentToolRequest {
  reserved 6;
  reserved "tool_grant";

  string session_id = 1;
  string turn_id = 2;
  string tool_call_id = 3;
  string tool_id = 4;
  google.protobuf.Struct arguments = 5;
  string idempotency_key = 7;
  string run_grant = 8;
}

message ExecuteAgentToolResponse {
  int32 status = 1;
  string body = 2;
}

message ListedAgentTool {
  string id = 1;
  string mcp_name = 2;
  string title = 3;
  string description = 4;
  string input_schema = 5;
  string output_schema = 6;
  OperationAnnotations annotations = 7;
  AgentToolRef ref = 8;
  repeated string tags = 9;
  string search_text = 10;
}

message ListAgentToolsRequest {
  reserved 5;
  reserved "tool_grant";

  string session_id = 1;
  string turn_id = 2;
  int32 page_size = 3;
  string page_token = 4;
  string run_grant = 6;
  string query = 7;
}

message ListAgentToolsResponse {
  repeated ListedAgentTool tools = 1;
  string next_page_token = 2;
}

message ResolveAgentConnectionRequest {
  string session_id = 1;
  string turn_id = 2;
  string connection = 3;
  string instance = 4;
  string run_grant = 5;
}

message ResolvedAgentConnection {
  string connection_id = 1;
  string connection = 2;
  string instance = 3;
  string mode = 4;
  map<string, string> headers = 5;
  map<string, string> params = 6;
  google.protobuf.Timestamp expires_at = 7;
}

message AgentManagerCreateSessionRequest {
  reserved 1, 6;
  reserved "request_handle", "provider_options";
  string provider_name = 2;
  string model = 3;
  string client_ref = 4;
  google.protobuf.Struct metadata = 5;
  string idempotency_key = 7;
  string invocation_token = 8;
  AgentWorkspace workspace = 9;
}

message AgentManagerGetSessionRequest {
  reserved 1;
  reserved "request_handle";
  string session_id = 2;
  string invocation_token = 3;
}

message AgentManagerListSessionsRequest {
  reserved 1;
  reserved "request_handle";
  string provider_name = 2;
  string invocation_token = 3;
  AgentSessionState state = 4;
  // Manager response cap after provider responses are normalized and globally
  // sorted by session recency.
  int32 limit = 5;
  bool summary_only = 6;
}

message AgentManagerListSessionsResponse {
  repeated AgentSession sessions = 1;
}

message AgentManagerUpdateSessionRequest {
  reserved 1;
  reserved "request_handle";
  string session_id = 2;
  string client_ref = 3;
  AgentSessionState state = 4;
  google.protobuf.Struct metadata = 5;
  string invocation_token = 6;
}

message AgentManagerCreateTurnRequest {
  reserved 1, 9;
  reserved "request_handle", "provider_options";
  string session_id = 2;
  string model = 3;
  repeated AgentMessage messages = 4;
  repeated AgentToolRef tool_refs = 5;
  AgentToolSourceMode tool_source = 6;
  google.protobuf.Struct response_schema = 7;
  google.protobuf.Struct metadata = 8;
  string idempotency_key = 10;
  string invocation_token = 11;
  google.protobuf.Struct model_options = 12;
}

message AgentManagerGetTurnRequest {
  reserved 1;
  reserved "request_handle";
  string turn_id = 2;
  string invocation_token = 3;
}

message AgentManagerListTurnsRequest {
  reserved 1;
  reserved "request_handle";
  string session_id = 2;
  string invocation_token = 3;
  AgentExecutionStatus status = 4;
  int32 limit = 5;
  bool summary_only = 6;
}

message AgentManagerListTurnsResponse {
  repeated AgentTurn turns = 1;
}

message AgentManagerCancelTurnRequest {
  reserved 1;
  reserved "request_handle";
  string turn_id = 2;
  string reason = 3;
  string invocation_token = 4;
}

message AgentManagerListTurnEventsRequest {
  reserved 1;
  reserved "request_handle";
  string turn_id = 2;
  int64 after_seq = 3;
  int32 limit = 4;
  string invocation_token = 5;
}

message AgentManagerListTurnEventsResponse {
  repeated AgentTurnEvent events = 1;
}

message AgentManagerListInteractionsRequest {
  reserved 1;
  reserved "request_handle";
  string turn_id = 2;
  string invocation_token = 3;
}

message AgentManagerListInteractionsResponse {
  repeated AgentInteraction interactions = 1;
}

message AgentManagerResolveInteractionRequest {
  reserved 1;
  reserved "request_handle";
  string turn_id = 2;
  string interaction_id = 3;
  google.protobuf.Struct resolution = 4;
  string invocation_token = 5;
}

service AgentProvider {
  rpc CreateSession(CreateAgentProviderSessionRequest) returns (AgentSession);
  rpc GetSession(GetAgentProviderSessionRequest) returns (AgentSession);
  rpc ListSessions(ListAgentProviderSessionsRequest) returns (ListAgentProviderSessionsResponse);
  rpc UpdateSession(UpdateAgentProviderSessionRequest) returns (AgentSession);

  rpc CreateTurn(CreateAgentProviderTurnRequest) returns (AgentTurn);
  rpc GetTurn(GetAgentProviderTurnRequest) returns (AgentTurn);
  rpc ListTurns(ListAgentProviderTurnsRequest) returns (ListAgentProviderTurnsResponse);
  rpc CancelTurn(CancelAgentProviderTurnRequest) returns (AgentTurn);

  rpc ListTurnEvents(ListAgentProviderTurnEventsRequest) returns (ListAgentProviderTurnEventsResponse);

  rpc GetInteraction(GetAgentProviderInteractionRequest) returns (AgentInteraction);
  rpc ListInteractions(ListAgentProviderInteractionsRequest) returns (ListAgentProviderInteractionsResponse);
  rpc ResolveInteraction(ResolveAgentProviderInteractionRequest) returns (AgentInteraction);
  rpc GetCapabilities(GetAgentProviderCapabilitiesRequest) returns (AgentProviderCapabilities);
}

service AgentHost {
  rpc ListTools(ListAgentToolsRequest) returns (ListAgentToolsResponse);
  rpc ExecuteTool(ExecuteAgentToolRequest) returns (ExecuteAgentToolResponse);
  rpc ResolveConnection(ResolveAgentConnectionRequest) returns (ResolvedAgentConnection);
}

service AgentManagerHost {
  rpc CreateSession(AgentManagerCreateSessionRequest) returns (AgentSession);
  rpc GetSession(AgentManagerGetSessionRequest) returns (AgentSession);
  rpc ListSessions(AgentManagerListSessionsRequest) returns (AgentManagerListSessionsResponse);
  rpc UpdateSession(AgentManagerUpdateSessionRequest) returns (AgentSession);
  rpc CreateTurn(AgentManagerCreateTurnRequest) returns (AgentTurn);
  rpc GetTurn(AgentManagerGetTurnRequest) returns (AgentTurn);
  rpc ListTurns(AgentManagerListTurnsRequest) returns (AgentManagerListTurnsResponse);
  rpc CancelTurn(AgentManagerCancelTurnRequest) returns (AgentTurn);
  rpc ListTurnEvents(AgentManagerListTurnEventsRequest) returns (AgentManagerListTurnEventsResponse);
  rpc ListInteractions(AgentManagerListInteractionsRequest) returns (AgentManagerListInteractionsResponse);
  rpc ResolveInteraction(AgentManagerResolveInteractionRequest) returns (AgentInteraction);
}
