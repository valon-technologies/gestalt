syntax = "proto3";

package gestalt.provider.v1;

option go_package = "github.com/valon-technologies/gestalt/sdk/go/gen/v1;proto";

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

message AgentMessage {
  string role = 1;
  string text = 2;
}

message AgentActor {
  string subject_id = 1;
  string subject_kind = 2;
  string display_name = 3;
  string auth_source = 4;
}

message BoundAgentToolTarget {
  string plugin_name = 1;
  string operation = 2;
  string connection = 3;
  string instance = 4;
}

message ResolvedAgentTool {
  string id = 1;
  string name = 2;
  string description = 3;
  BoundAgentToolTarget target = 4;
  google.protobuf.Struct parameters_schema = 5;
}

message AgentToolRef {
  string plugin_name = 1;
  string operation = 2;
  string connection = 3;
  string instance = 4;
  string title = 5;
  string description = 6;
}

enum AgentToolSourceMode {
  AGENT_TOOL_SOURCE_MODE_UNSPECIFIED = 0;
  AGENT_TOOL_SOURCE_MODE_EXPLICIT = 1;
  AGENT_TOOL_SOURCE_MODE_INHERIT_INVOKES = 2;
}

enum AgentRunStatus {
  AGENT_RUN_STATUS_UNSPECIFIED = 0;
  AGENT_RUN_STATUS_PENDING = 1;
  AGENT_RUN_STATUS_RUNNING = 2;
  AGENT_RUN_STATUS_SUCCEEDED = 3;
  AGENT_RUN_STATUS_FAILED = 4;
  AGENT_RUN_STATUS_CANCELED = 5;
}

message BoundAgentRun {
  string id = 1;
  string provider_name = 2;
  string model = 3;
  AgentRunStatus status = 4;
  repeated AgentMessage messages = 5;
  string output_text = 6;
  google.protobuf.Struct structured_output = 7;
  string status_message = 8;
  string session_ref = 9;
  AgentActor created_by = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp started_at = 12;
  google.protobuf.Timestamp completed_at = 13;
  string execution_ref = 14;
}

message StartAgentProviderRunRequest {
  string run_id = 1;
  string idempotency_key = 2;
  string provider_name = 3;
  string model = 4;
  repeated AgentMessage messages = 5;
  repeated ResolvedAgentTool tools = 6;
  google.protobuf.Struct response_schema = 7;
  string session_ref = 8;
  google.protobuf.Struct metadata = 9;
  google.protobuf.Struct provider_options = 10;
  AgentActor created_by = 11;
  string execution_ref = 12;
}

message GetAgentProviderRunRequest {
  string run_id = 1;
}

message ListAgentProviderRunsRequest {}

message ListAgentProviderRunsResponse {
  repeated BoundAgentRun runs = 1;
}

message CancelAgentProviderRunRequest {
  string run_id = 1;
  string reason = 2;
}

message ExecuteAgentToolRequest {
  string run_id = 1;
  string tool_call_id = 2;
  string tool_id = 3;
  google.protobuf.Struct arguments = 4;
}

message ExecuteAgentToolResponse {
  int32 status = 1;
  string body = 2;
}

message ManagedAgentRun {
  string provider_name = 1;
  BoundAgentRun run = 2;
}

message AgentManagerRunRequest {
  reserved 1;
  reserved "request_handle";
  string provider_name = 2;
  string model = 3;
  repeated AgentMessage messages = 4;
  repeated AgentToolRef tool_refs = 5;
  AgentToolSourceMode tool_source = 6;
  google.protobuf.Struct response_schema = 7;
  string session_ref = 8;
  google.protobuf.Struct metadata = 9;
  google.protobuf.Struct provider_options = 10;
  string idempotency_key = 11;
  string invocation_token = 12;
}

message AgentManagerGetRunRequest {
  reserved 1;
  reserved "request_handle";
  string run_id = 2;
  string invocation_token = 3;
}

message AgentManagerListRunsRequest {
  reserved 1;
  reserved "request_handle";
  string invocation_token = 2;
}

message AgentManagerListRunsResponse {
  repeated ManagedAgentRun runs = 1;
}

message AgentManagerCancelRunRequest {
  reserved 1;
  reserved "request_handle";
  string run_id = 2;
  string reason = 3;
  string invocation_token = 4;
}

service AgentProvider {
  rpc StartRun(StartAgentProviderRunRequest) returns (BoundAgentRun);
  rpc GetRun(GetAgentProviderRunRequest) returns (BoundAgentRun);
  rpc ListRuns(ListAgentProviderRunsRequest) returns (ListAgentProviderRunsResponse);
  rpc CancelRun(CancelAgentProviderRunRequest) returns (BoundAgentRun);
}

service AgentHost {
  rpc ExecuteTool(ExecuteAgentToolRequest) returns (ExecuteAgentToolResponse);
}

service AgentManagerHost {
  rpc Run(AgentManagerRunRequest) returns (ManagedAgentRun);
  rpc GetRun(AgentManagerGetRunRequest) returns (ManagedAgentRun);
  rpc ListRuns(AgentManagerListRunsRequest) returns (AgentManagerListRunsResponse);
  rpc CancelRun(AgentManagerCancelRunRequest) returns (ManagedAgentRun);
}
