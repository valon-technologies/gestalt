syntax = "proto3";

package gestalt.provider.v1;

option go_package = "github.com/valon-technologies/gestalt/sdk/go/gen/v1;proto";

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

message AgentMessage {
  string role = 1;
  string text = 2;
  repeated AgentMessagePart parts = 3;
  google.protobuf.Struct metadata = 4;
}

enum AgentMessagePartType {
  AGENT_MESSAGE_PART_TYPE_UNSPECIFIED = 0;
  AGENT_MESSAGE_PART_TYPE_TEXT = 1;
  AGENT_MESSAGE_PART_TYPE_JSON = 2;
  AGENT_MESSAGE_PART_TYPE_TOOL_CALL = 3;
  AGENT_MESSAGE_PART_TYPE_TOOL_RESULT = 4;
  AGENT_MESSAGE_PART_TYPE_IMAGE_REF = 5;
}

message AgentMessagePartToolCall {
  string id = 1;
  string tool_id = 2;
  google.protobuf.Struct arguments = 3;
}

message AgentMessagePartToolResult {
  string tool_call_id = 1;
  int32 status = 2;
  string content = 3;
  google.protobuf.Struct output = 4;
}

message AgentMessagePartImageRef {
  string uri = 1;
  string mime_type = 2;
}

message AgentMessagePart {
  AgentMessagePartType type = 1;
  string text = 2;
  google.protobuf.Struct json = 3;
  AgentMessagePartToolCall tool_call = 4;
  AgentMessagePartToolResult tool_result = 5;
  AgentMessagePartImageRef image_ref = 6;
}

message AgentActor {
  string subject_id = 1;
  string subject_kind = 2;
  string display_name = 3;
  string auth_source = 4;
}

message BoundAgentToolTarget {
  string plugin_name = 1;
  string operation = 2;
  string connection = 3;
  string instance = 4;
}

message ResolvedAgentTool {
  string id = 1;
  string name = 2;
  string description = 3;
  BoundAgentToolTarget target = 4;
  google.protobuf.Struct parameters_schema = 5;
}

message AgentToolRef {
  string plugin_name = 1;
  string operation = 2;
  string connection = 3;
  string instance = 4;
  string title = 5;
  string description = 6;
}

enum AgentToolSourceMode {
  AGENT_TOOL_SOURCE_MODE_UNSPECIFIED = 0;
  AGENT_TOOL_SOURCE_MODE_EXPLICIT = 1;
  AGENT_TOOL_SOURCE_MODE_INHERIT_INVOKES = 2;
}

enum AgentRunStatus {
  AGENT_RUN_STATUS_UNSPECIFIED = 0;
  AGENT_RUN_STATUS_PENDING = 1;
  AGENT_RUN_STATUS_RUNNING = 2;
  AGENT_RUN_STATUS_SUCCEEDED = 3;
  AGENT_RUN_STATUS_FAILED = 4;
  AGENT_RUN_STATUS_CANCELED = 5;
  AGENT_RUN_STATUS_WAITING_FOR_INPUT = 6;
}

enum AgentInteractionType {
  AGENT_INTERACTION_TYPE_UNSPECIFIED = 0;
  AGENT_INTERACTION_TYPE_APPROVAL = 1;
  AGENT_INTERACTION_TYPE_CLARIFICATION = 2;
  AGENT_INTERACTION_TYPE_INPUT = 3;
}

enum AgentInteractionState {
  AGENT_INTERACTION_STATE_UNSPECIFIED = 0;
  AGENT_INTERACTION_STATE_PENDING = 1;
  AGENT_INTERACTION_STATE_RESOLVED = 2;
  AGENT_INTERACTION_STATE_CANCELED = 3;
}

message AgentProviderCapabilities {
  bool streaming_text = 1;
  bool tool_calls = 2;
  bool parallel_tool_calls = 3;
  bool structured_output = 4;
  bool session_continuation = 5;
  bool approvals = 6;
  bool resumable_runs = 7;
  bool reasoning_summaries = 8;
}

message GetAgentProviderCapabilitiesRequest {}

message ResumeAgentProviderRunRequest {
  string run_id = 1;
  string interaction_id = 2;
  google.protobuf.Struct resolution = 3;
}

message RequestAgentInteractionRequest {
  string run_id = 1;
  AgentInteractionType type = 2;
  string title = 3;
  string prompt = 4;
  google.protobuf.Struct request = 5;
}

message AgentInteraction {
  string id = 1;
  string run_id = 2;
  AgentInteractionType type = 3;
  AgentInteractionState state = 4;
  string title = 5;
  string prompt = 6;
  google.protobuf.Struct request = 7;
  google.protobuf.Struct resolution = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp resolved_at = 10;
}

message BoundAgentRun {
  string id = 1;
  string provider_name = 2;
  string model = 3;
  AgentRunStatus status = 4;
  repeated AgentMessage messages = 5;
  string output_text = 6;
  google.protobuf.Struct structured_output = 7;
  string status_message = 8;
  string session_ref = 9;
  AgentActor created_by = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp started_at = 12;
  google.protobuf.Timestamp completed_at = 13;
  string execution_ref = 14;
}

message StartAgentProviderRunRequest {
  string run_id = 1;
  string idempotency_key = 2;
  string provider_name = 3;
  string model = 4;
  repeated AgentMessage messages = 5;
  repeated ResolvedAgentTool tools = 6;
  google.protobuf.Struct response_schema = 7;
  string session_ref = 8;
  google.protobuf.Struct metadata = 9;
  google.protobuf.Struct provider_options = 10;
  AgentActor created_by = 11;
  string execution_ref = 12;
}

message GetAgentProviderRunRequest {
  string run_id = 1;
}

message ListAgentProviderRunsRequest {}

message ListAgentProviderRunsResponse {
  repeated BoundAgentRun runs = 1;
}

message CancelAgentProviderRunRequest {
  string run_id = 1;
  string reason = 2;
}

message ExecuteAgentToolRequest {
  string run_id = 1;
  string tool_call_id = 2;
  string tool_id = 3;
  google.protobuf.Struct arguments = 4;
}

message ExecuteAgentToolResponse {
  int32 status = 1;
  string body = 2;
}

message AgentRunEvent {
  string id = 1;
  string run_id = 2;
  int64 seq = 3;
  string type = 4;
  string source = 5;
  string visibility = 6;
  google.protobuf.Struct data = 7;
  google.protobuf.Timestamp created_at = 8;
}

message EmitAgentEventRequest {
  string run_id = 1;
  string type = 2;
  string visibility = 3;
  google.protobuf.Struct data = 4;
}

message ManagedAgentRun {
  string provider_name = 1;
  BoundAgentRun run = 2;
}

message AgentManagerRunRequest {
  reserved 1;
  reserved "request_handle";
  string provider_name = 2;
  string model = 3;
  repeated AgentMessage messages = 4;
  repeated AgentToolRef tool_refs = 5;
  AgentToolSourceMode tool_source = 6;
  google.protobuf.Struct response_schema = 7;
  string session_ref = 8;
  google.protobuf.Struct metadata = 9;
  google.protobuf.Struct provider_options = 10;
  string idempotency_key = 11;
  string invocation_token = 12;
}

message AgentManagerGetRunRequest {
  reserved 1;
  reserved "request_handle";
  string run_id = 2;
  string invocation_token = 3;
}

message AgentManagerListRunsRequest {
  reserved 1;
  reserved "request_handle";
  string invocation_token = 2;
}

message AgentManagerListRunsResponse {
  repeated ManagedAgentRun runs = 1;
}

message AgentManagerCancelRunRequest {
  reserved 1;
  reserved "request_handle";
  string run_id = 2;
  string reason = 3;
  string invocation_token = 4;
}

service AgentProvider {
  rpc StartRun(StartAgentProviderRunRequest) returns (BoundAgentRun);
  rpc GetRun(GetAgentProviderRunRequest) returns (BoundAgentRun);
  rpc ListRuns(ListAgentProviderRunsRequest) returns (ListAgentProviderRunsResponse);
  rpc CancelRun(CancelAgentProviderRunRequest) returns (BoundAgentRun);
  rpc GetCapabilities(GetAgentProviderCapabilitiesRequest) returns (AgentProviderCapabilities);
  rpc ResumeRun(ResumeAgentProviderRunRequest) returns (BoundAgentRun);
}

service AgentHost {
  rpc ExecuteTool(ExecuteAgentToolRequest) returns (ExecuteAgentToolResponse);
  rpc EmitEvent(EmitAgentEventRequest) returns (google.protobuf.Empty);
  rpc RequestInteraction(RequestAgentInteractionRequest) returns (AgentInteraction);
}

service AgentManagerHost {
  rpc Run(AgentManagerRunRequest) returns (ManagedAgentRun);
  rpc GetRun(AgentManagerGetRunRequest) returns (ManagedAgentRun);
  rpc ListRuns(AgentManagerListRunsRequest) returns (AgentManagerListRunsResponse);
  rpc CancelRun(AgentManagerCancelRunRequest) returns (ManagedAgentRun);
}
