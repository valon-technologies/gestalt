syntax = "proto3";

package gestalt.provider.v1;

option go_package = "github.com/valon-technologies/gestalt/sdk/go/gen/v1;proto";

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

message BoundWorkflowTarget {
  string plugin_name = 1;
  string operation = 2;
  google.protobuf.Struct input = 3;
  string connection = 4;
  string instance = 5;
}

message WorkflowActor {
  string subject_id = 1;
  string subject_kind = 2;
  string display_name = 3;
  string auth_source = 4;
}

enum WorkflowRunStatus {
  WORKFLOW_RUN_STATUS_UNSPECIFIED = 0;
  WORKFLOW_RUN_STATUS_PENDING = 1;
  WORKFLOW_RUN_STATUS_RUNNING = 2;
  WORKFLOW_RUN_STATUS_SUCCEEDED = 3;
  WORKFLOW_RUN_STATUS_FAILED = 4;
  WORKFLOW_RUN_STATUS_CANCELED = 5;
}

message WorkflowEvent {
  string id = 1;
  string source = 2;
  string spec_version = 3;
  string type = 4;
  string subject = 5;
  google.protobuf.Timestamp time = 6;
  string datacontenttype = 7;
  google.protobuf.Struct data = 8;
  map<string, google.protobuf.Value> extensions = 9;
}

message WorkflowEventMatch {
  string type = 1;
  string source = 2;
  string subject = 3;
}

message WorkflowManualTrigger {}

message WorkflowScheduleTrigger {
  string schedule_id = 1;
  google.protobuf.Timestamp scheduled_for = 2;
}

message WorkflowEventTriggerInvocation {
  string trigger_id = 1;
  WorkflowEvent event = 2;
}

message WorkflowRunTrigger {
  oneof kind {
    WorkflowManualTrigger manual = 1;
    WorkflowScheduleTrigger schedule = 2;
    WorkflowEventTriggerInvocation event = 3;
  }
}

message BoundWorkflowRun {
  string id = 1;
  WorkflowRunStatus status = 2;
  BoundWorkflowTarget target = 3;
  WorkflowRunTrigger trigger = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp started_at = 6;
  google.protobuf.Timestamp completed_at = 7;
  string status_message = 8;
  string result_body = 9;
  WorkflowActor created_by = 10;
  string execution_ref = 11;
}

message BoundWorkflowSchedule {
  string id = 1;
  string cron = 2;
  string timezone = 3;
  BoundWorkflowTarget target = 4;
  bool paused = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  google.protobuf.Timestamp next_run_at = 8;
  WorkflowActor created_by = 9;
  string execution_ref = 10;
}

message BoundWorkflowEventTrigger {
  string id = 1;
  WorkflowEventMatch match = 2;
  BoundWorkflowTarget target = 3;
  bool paused = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  WorkflowActor created_by = 7;
  string execution_ref = 8;
}

message WorkflowAccessPermission {
  string plugin = 1;
  repeated string operations = 2;
}

message WorkflowExecutionReference {
  string id = 1;
  string provider_name = 2;
  BoundWorkflowTarget target = 3;
  string subject_id = 4;
  string credential_subject_id = 5;
  repeated WorkflowAccessPermission permissions = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp revoked_at = 8;
}

message StartWorkflowProviderRunRequest {
  BoundWorkflowTarget target = 1;
  string idempotency_key = 2;
  WorkflowActor created_by = 4;
  string execution_ref = 5;
}

message GetWorkflowProviderRunRequest {
  string run_id = 2;
}

message ListWorkflowProviderRunsRequest {}

message ListWorkflowProviderRunsResponse {
  repeated BoundWorkflowRun runs = 1;
}

message CancelWorkflowProviderRunRequest {
  string run_id = 2;
  string reason = 3;
}

message UpsertWorkflowProviderScheduleRequest {
  string schedule_id = 1;
  string cron = 2;
  string timezone = 3;
  BoundWorkflowTarget target = 4;
  bool paused = 5;
  WorkflowActor requested_by = 7;
  string execution_ref = 8;
}

message GetWorkflowProviderScheduleRequest {
  string schedule_id = 2;
}

message ListWorkflowProviderSchedulesRequest {}

message ListWorkflowProviderSchedulesResponse {
  repeated BoundWorkflowSchedule schedules = 1;
}

message DeleteWorkflowProviderScheduleRequest {
  string schedule_id = 2;
}

message PauseWorkflowProviderScheduleRequest {
  string schedule_id = 2;
}

message ResumeWorkflowProviderScheduleRequest {
  string schedule_id = 2;
}

message UpsertWorkflowProviderEventTriggerRequest {
  string trigger_id = 1;
  WorkflowEventMatch match = 2;
  BoundWorkflowTarget target = 3;
  bool paused = 4;
  WorkflowActor requested_by = 6;
  string execution_ref = 7;
}

message GetWorkflowProviderEventTriggerRequest {
  string trigger_id = 2;
}

message ListWorkflowProviderEventTriggersRequest {}

message ListWorkflowProviderEventTriggersResponse {
  repeated BoundWorkflowEventTrigger triggers = 1;
}

message PutWorkflowExecutionReferenceRequest {
  WorkflowExecutionReference reference = 1;
}

message GetWorkflowExecutionReferenceRequest {
  string id = 1;
}

message ListWorkflowExecutionReferencesRequest {
  string subject_id = 1;
}

message ListWorkflowExecutionReferencesResponse {
  repeated WorkflowExecutionReference references = 1;
}

message DeleteWorkflowProviderEventTriggerRequest {
  string trigger_id = 2;
}

message PauseWorkflowProviderEventTriggerRequest {
  string trigger_id = 2;
}

message ResumeWorkflowProviderEventTriggerRequest {
  string trigger_id = 2;
}

message PublishWorkflowProviderEventRequest {
  string plugin_name = 1;
  WorkflowEvent event = 2;
}

message InvokeWorkflowOperationRequest {
  BoundWorkflowTarget target = 1;
  string run_id = 2;
  WorkflowRunTrigger trigger = 3;
  google.protobuf.Struct input = 4;
  google.protobuf.Struct metadata = 5;
  WorkflowActor created_by = 7;
  string execution_ref = 8;
}

message InvokeWorkflowOperationResponse {
  int32 status = 1;
  string body = 2;
}

message ManagedWorkflowSchedule {
  string provider_name = 1;
  BoundWorkflowSchedule schedule = 2;
}

message ManagedWorkflowEventTrigger {
  string provider_name = 1;
  BoundWorkflowEventTrigger trigger = 2;
}

message WorkflowManagerCreateScheduleRequest {
  reserved 1;
  reserved "request_handle";
  string provider_name = 2;
  string cron = 3;
  string timezone = 4;
  BoundWorkflowTarget target = 5;
  bool paused = 6;
  string invocation_token = 7;
}

message WorkflowManagerGetScheduleRequest {
  reserved 1;
  reserved "request_handle";
  string schedule_id = 2;
  string invocation_token = 3;
}

message WorkflowManagerUpdateScheduleRequest {
  reserved 1;
  reserved "request_handle";
  string schedule_id = 2;
  string provider_name = 3;
  string cron = 4;
  string timezone = 5;
  BoundWorkflowTarget target = 6;
  bool paused = 7;
  string invocation_token = 8;
}

message WorkflowManagerDeleteScheduleRequest {
  reserved 1;
  reserved "request_handle";
  string schedule_id = 2;
  string invocation_token = 3;
}

message WorkflowManagerPauseScheduleRequest {
  reserved 1;
  reserved "request_handle";
  string schedule_id = 2;
  string invocation_token = 3;
}

message WorkflowManagerResumeScheduleRequest {
  reserved 1;
  reserved "request_handle";
  string schedule_id = 2;
  string invocation_token = 3;
}

message WorkflowManagerCreateEventTriggerRequest {
  reserved 1;
  reserved "request_handle";
  string provider_name = 2;
  WorkflowEventMatch match = 3;
  BoundWorkflowTarget target = 4;
  bool paused = 5;
  string invocation_token = 6;
}

message WorkflowManagerGetEventTriggerRequest {
  reserved 1;
  reserved "request_handle";
  string trigger_id = 2;
  string invocation_token = 3;
}

message WorkflowManagerUpdateEventTriggerRequest {
  reserved 1;
  reserved "request_handle";
  string trigger_id = 2;
  string provider_name = 3;
  WorkflowEventMatch match = 4;
  BoundWorkflowTarget target = 5;
  bool paused = 6;
  string invocation_token = 7;
}

message WorkflowManagerDeleteEventTriggerRequest {
  reserved 1;
  reserved "request_handle";
  string trigger_id = 2;
  string invocation_token = 3;
}

message WorkflowManagerPauseEventTriggerRequest {
  reserved 1;
  reserved "request_handle";
  string trigger_id = 2;
  string invocation_token = 3;
}

message WorkflowManagerResumeEventTriggerRequest {
  reserved 1;
  reserved "request_handle";
  string trigger_id = 2;
  string invocation_token = 3;
}

message WorkflowManagerPublishEventRequest {
  reserved 1;
  reserved "request_handle";
  WorkflowEvent event = 2;
  string invocation_token = 3;
}

service WorkflowProvider {
  rpc StartRun(StartWorkflowProviderRunRequest) returns (BoundWorkflowRun);
  rpc GetRun(GetWorkflowProviderRunRequest) returns (BoundWorkflowRun);
  rpc ListRuns(ListWorkflowProviderRunsRequest) returns (ListWorkflowProviderRunsResponse);
  rpc CancelRun(CancelWorkflowProviderRunRequest) returns (BoundWorkflowRun);

  rpc UpsertSchedule(UpsertWorkflowProviderScheduleRequest) returns (BoundWorkflowSchedule);
  rpc GetSchedule(GetWorkflowProviderScheduleRequest) returns (BoundWorkflowSchedule);
  rpc ListSchedules(ListWorkflowProviderSchedulesRequest) returns (ListWorkflowProviderSchedulesResponse);
  rpc DeleteSchedule(DeleteWorkflowProviderScheduleRequest) returns (google.protobuf.Empty);
  rpc PauseSchedule(PauseWorkflowProviderScheduleRequest) returns (BoundWorkflowSchedule);
  rpc ResumeSchedule(ResumeWorkflowProviderScheduleRequest) returns (BoundWorkflowSchedule);

  rpc UpsertEventTrigger(UpsertWorkflowProviderEventTriggerRequest) returns (BoundWorkflowEventTrigger);
  rpc GetEventTrigger(GetWorkflowProviderEventTriggerRequest) returns (BoundWorkflowEventTrigger);
  rpc ListEventTriggers(ListWorkflowProviderEventTriggersRequest) returns (ListWorkflowProviderEventTriggersResponse);
  rpc DeleteEventTrigger(DeleteWorkflowProviderEventTriggerRequest) returns (google.protobuf.Empty);
  rpc PauseEventTrigger(PauseWorkflowProviderEventTriggerRequest) returns (BoundWorkflowEventTrigger);
  rpc ResumeEventTrigger(ResumeWorkflowProviderEventTriggerRequest) returns (BoundWorkflowEventTrigger);

  rpc PutExecutionReference(PutWorkflowExecutionReferenceRequest) returns (WorkflowExecutionReference);
  rpc GetExecutionReference(GetWorkflowExecutionReferenceRequest) returns (WorkflowExecutionReference);
  rpc ListExecutionReferences(ListWorkflowExecutionReferencesRequest) returns (ListWorkflowExecutionReferencesResponse);

  rpc PublishEvent(PublishWorkflowProviderEventRequest) returns (google.protobuf.Empty);
}

service WorkflowHost {
  rpc InvokeOperation(InvokeWorkflowOperationRequest) returns (InvokeWorkflowOperationResponse);
}

service WorkflowManagerHost {
  rpc CreateSchedule(WorkflowManagerCreateScheduleRequest) returns (ManagedWorkflowSchedule);
  rpc GetSchedule(WorkflowManagerGetScheduleRequest) returns (ManagedWorkflowSchedule);
  rpc UpdateSchedule(WorkflowManagerUpdateScheduleRequest) returns (ManagedWorkflowSchedule);
  rpc DeleteSchedule(WorkflowManagerDeleteScheduleRequest) returns (google.protobuf.Empty);
  rpc PauseSchedule(WorkflowManagerPauseScheduleRequest) returns (ManagedWorkflowSchedule);
  rpc ResumeSchedule(WorkflowManagerResumeScheduleRequest) returns (ManagedWorkflowSchedule);

  rpc CreateEventTrigger(WorkflowManagerCreateEventTriggerRequest) returns (ManagedWorkflowEventTrigger);
  rpc GetEventTrigger(WorkflowManagerGetEventTriggerRequest) returns (ManagedWorkflowEventTrigger);
  rpc UpdateEventTrigger(WorkflowManagerUpdateEventTriggerRequest) returns (ManagedWorkflowEventTrigger);
  rpc DeleteEventTrigger(WorkflowManagerDeleteEventTriggerRequest) returns (google.protobuf.Empty);
  rpc PauseEventTrigger(WorkflowManagerPauseEventTriggerRequest) returns (ManagedWorkflowEventTrigger);
  rpc ResumeEventTrigger(WorkflowManagerResumeEventTriggerRequest) returns (ManagedWorkflowEventTrigger);

  rpc PublishEvent(WorkflowManagerPublishEventRequest) returns (WorkflowEvent);
}
