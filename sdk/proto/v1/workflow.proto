syntax = "proto3";

package gestalt.provider.v1;

option go_package = "github.com/valon-technologies/gestalt/sdk/go/gen/v1;proto";

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

message WorkflowTarget {
  string operation = 1;
  google.protobuf.Struct input = 2;
}

message BoundWorkflowTarget {
  string plugin_name = 1;
  string operation = 2;
  google.protobuf.Struct input = 3;
}

message WorkflowActor {
  string subject_id = 1;
  string subject_kind = 2;
  string display_name = 3;
  string auth_source = 4;
}

enum WorkflowRunStatus {
  WORKFLOW_RUN_STATUS_UNSPECIFIED = 0;
  WORKFLOW_RUN_STATUS_PENDING = 1;
  WORKFLOW_RUN_STATUS_RUNNING = 2;
  WORKFLOW_RUN_STATUS_SUCCEEDED = 3;
  WORKFLOW_RUN_STATUS_FAILED = 4;
  WORKFLOW_RUN_STATUS_CANCELED = 5;
}

message WorkflowEvent {
  string id = 1;
  string source = 2;
  string spec_version = 3;
  string type = 4;
  string subject = 5;
  google.protobuf.Timestamp time = 6;
  string datacontenttype = 7;
  google.protobuf.Struct data = 8;
  map<string, google.protobuf.Value> extensions = 9;
}

message WorkflowEventMatch {
  string type = 1;
  string source = 2;
  string subject = 3;
}

message WorkflowManualTrigger {}

message WorkflowScheduleTrigger {
  string schedule_id = 1;
  google.protobuf.Timestamp scheduled_for = 2;
}

message WorkflowEventTriggerInvocation {
  string trigger_id = 1;
  WorkflowEvent event = 2;
}

message WorkflowRunTrigger {
  oneof kind {
    WorkflowManualTrigger manual = 1;
    WorkflowScheduleTrigger schedule = 2;
    WorkflowEventTriggerInvocation event = 3;
  }
}

message WorkflowRun {
  string id = 1;
  WorkflowRunStatus status = 2;
  WorkflowTarget target = 3;
  WorkflowRunTrigger trigger = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp started_at = 6;
  google.protobuf.Timestamp completed_at = 7;
  string status_message = 8;
  string result_body = 9;
  WorkflowActor created_by = 10;
}

message WorkflowSchedule {
  string id = 1;
  string cron = 2;
  string timezone = 3;
  WorkflowTarget target = 4;
  bool paused = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  google.protobuf.Timestamp next_run_at = 8;
  WorkflowActor created_by = 9;
}

message WorkflowEventTrigger {
  string id = 1;
  WorkflowEventMatch match = 2;
  WorkflowTarget target = 3;
  bool paused = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  WorkflowActor created_by = 7;
}

message StartWorkflowRunRequest {
  WorkflowTarget target = 1;
  string idempotency_key = 2;
}

message GetWorkflowRunRequest {
  string run_id = 1;
}

message ListWorkflowRunsRequest {}

message ListWorkflowRunsResponse {
  repeated WorkflowRun runs = 1;
}

message CancelWorkflowRunRequest {
  string run_id = 1;
  string reason = 2;
}

message UpsertWorkflowScheduleRequest {
  string schedule_id = 1;
  string cron = 2;
  string timezone = 3;
  WorkflowTarget target = 4;
  bool paused = 5;
}

message GetWorkflowScheduleRequest {
  string schedule_id = 1;
}

message ListWorkflowSchedulesRequest {}

message ListWorkflowSchedulesResponse {
  repeated WorkflowSchedule schedules = 1;
}

message DeleteWorkflowScheduleRequest {
  string schedule_id = 1;
}

message PauseWorkflowScheduleRequest {
  string schedule_id = 1;
}

message ResumeWorkflowScheduleRequest {
  string schedule_id = 1;
}

message UpsertWorkflowEventTriggerRequest {
  string trigger_id = 1;
  WorkflowEventMatch match = 2;
  WorkflowTarget target = 3;
  bool paused = 4;
}

message GetWorkflowEventTriggerRequest {
  string trigger_id = 1;
}

message ListWorkflowEventTriggersRequest {}

message ListWorkflowEventTriggersResponse {
  repeated WorkflowEventTrigger triggers = 1;
}

message DeleteWorkflowEventTriggerRequest {
  string trigger_id = 1;
}

message PauseWorkflowEventTriggerRequest {
  string trigger_id = 1;
}

message ResumeWorkflowEventTriggerRequest {
  string trigger_id = 1;
}

message PublishWorkflowEventRequest {
  WorkflowEvent event = 1;
}

message BoundWorkflowRun {
  string id = 1;
  WorkflowRunStatus status = 2;
  BoundWorkflowTarget target = 3;
  WorkflowRunTrigger trigger = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp started_at = 6;
  google.protobuf.Timestamp completed_at = 7;
  string status_message = 8;
  string result_body = 9;
  WorkflowActor created_by = 10;
}

message BoundWorkflowSchedule {
  string id = 1;
  string cron = 2;
  string timezone = 3;
  BoundWorkflowTarget target = 4;
  bool paused = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  google.protobuf.Timestamp next_run_at = 8;
  WorkflowActor created_by = 9;
}

message BoundWorkflowEventTrigger {
  string id = 1;
  WorkflowEventMatch match = 2;
  BoundWorkflowTarget target = 3;
  bool paused = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  WorkflowActor created_by = 7;
}

message StartWorkflowProviderRunRequest {
  BoundWorkflowTarget target = 1;
  string idempotency_key = 2;
  string plugin_name = 3;
  WorkflowActor created_by = 4;
}

message GetWorkflowProviderRunRequest {
  string plugin_name = 1;
  string run_id = 2;
}

message ListWorkflowProviderRunsRequest {
  string plugin_name = 1;
}

message ListWorkflowProviderRunsResponse {
  repeated BoundWorkflowRun runs = 1;
}

message CancelWorkflowProviderRunRequest {
  string plugin_name = 1;
  string run_id = 2;
  string reason = 3;
}

message UpsertWorkflowProviderScheduleRequest {
  string schedule_id = 1;
  string cron = 2;
  string timezone = 3;
  BoundWorkflowTarget target = 4;
  bool paused = 5;
  string plugin_name = 6;
  WorkflowActor requested_by = 7;
}

message GetWorkflowProviderScheduleRequest {
  string plugin_name = 1;
  string schedule_id = 2;
}

message ListWorkflowProviderSchedulesRequest {
  string plugin_name = 1;
}

message ListWorkflowProviderSchedulesResponse {
  repeated BoundWorkflowSchedule schedules = 1;
}

message DeleteWorkflowProviderScheduleRequest {
  string plugin_name = 1;
  string schedule_id = 2;
}

message PauseWorkflowProviderScheduleRequest {
  string plugin_name = 1;
  string schedule_id = 2;
}

message ResumeWorkflowProviderScheduleRequest {
  string plugin_name = 1;
  string schedule_id = 2;
}

message UpsertWorkflowProviderEventTriggerRequest {
  string trigger_id = 1;
  WorkflowEventMatch match = 2;
  BoundWorkflowTarget target = 3;
  bool paused = 4;
  string plugin_name = 5;
  WorkflowActor requested_by = 6;
}

message GetWorkflowProviderEventTriggerRequest {
  string plugin_name = 1;
  string trigger_id = 2;
}

message ListWorkflowProviderEventTriggersRequest {
  string plugin_name = 1;
}

message ListWorkflowProviderEventTriggersResponse {
  repeated BoundWorkflowEventTrigger triggers = 1;
}

message DeleteWorkflowProviderEventTriggerRequest {
  string plugin_name = 1;
  string trigger_id = 2;
}

message PauseWorkflowProviderEventTriggerRequest {
  string plugin_name = 1;
  string trigger_id = 2;
}

message ResumeWorkflowProviderEventTriggerRequest {
  string plugin_name = 1;
  string trigger_id = 2;
}

message PublishWorkflowProviderEventRequest {
  string plugin_name = 1;
  WorkflowEvent event = 2;
}

message InvokeWorkflowOperationRequest {
  BoundWorkflowTarget target = 1;
  string run_id = 2;
  WorkflowRunTrigger trigger = 3;
  google.protobuf.Struct input = 4;
  google.protobuf.Struct metadata = 5;
  string plugin_name = 6;
  WorkflowActor created_by = 7;
}

message InvokeWorkflowOperationResponse {
  int32 status = 1;
  string body = 2;
}

service Workflow {
  rpc StartRun(StartWorkflowRunRequest) returns (WorkflowRun);
  rpc GetRun(GetWorkflowRunRequest) returns (WorkflowRun);
  rpc ListRuns(ListWorkflowRunsRequest) returns (ListWorkflowRunsResponse);
  rpc CancelRun(CancelWorkflowRunRequest) returns (WorkflowRun);

  rpc UpsertSchedule(UpsertWorkflowScheduleRequest) returns (WorkflowSchedule);
  rpc GetSchedule(GetWorkflowScheduleRequest) returns (WorkflowSchedule);
  rpc ListSchedules(ListWorkflowSchedulesRequest) returns (ListWorkflowSchedulesResponse);
  rpc DeleteSchedule(DeleteWorkflowScheduleRequest) returns (google.protobuf.Empty);
  rpc PauseSchedule(PauseWorkflowScheduleRequest) returns (WorkflowSchedule);
  rpc ResumeSchedule(ResumeWorkflowScheduleRequest) returns (WorkflowSchedule);

  rpc UpsertEventTrigger(UpsertWorkflowEventTriggerRequest) returns (WorkflowEventTrigger);
  rpc GetEventTrigger(GetWorkflowEventTriggerRequest) returns (WorkflowEventTrigger);
  rpc ListEventTriggers(ListWorkflowEventTriggersRequest) returns (ListWorkflowEventTriggersResponse);
  rpc DeleteEventTrigger(DeleteWorkflowEventTriggerRequest) returns (google.protobuf.Empty);
  rpc PauseEventTrigger(PauseWorkflowEventTriggerRequest) returns (WorkflowEventTrigger);
  rpc ResumeEventTrigger(ResumeWorkflowEventTriggerRequest) returns (WorkflowEventTrigger);

  rpc PublishEvent(PublishWorkflowEventRequest) returns (google.protobuf.Empty);
}

service WorkflowProvider {
  rpc StartRun(StartWorkflowProviderRunRequest) returns (BoundWorkflowRun);
  rpc GetRun(GetWorkflowProviderRunRequest) returns (BoundWorkflowRun);
  rpc ListRuns(ListWorkflowProviderRunsRequest) returns (ListWorkflowProviderRunsResponse);
  rpc CancelRun(CancelWorkflowProviderRunRequest) returns (BoundWorkflowRun);

  rpc UpsertSchedule(UpsertWorkflowProviderScheduleRequest) returns (BoundWorkflowSchedule);
  rpc GetSchedule(GetWorkflowProviderScheduleRequest) returns (BoundWorkflowSchedule);
  rpc ListSchedules(ListWorkflowProviderSchedulesRequest) returns (ListWorkflowProviderSchedulesResponse);
  rpc DeleteSchedule(DeleteWorkflowProviderScheduleRequest) returns (google.protobuf.Empty);
  rpc PauseSchedule(PauseWorkflowProviderScheduleRequest) returns (BoundWorkflowSchedule);
  rpc ResumeSchedule(ResumeWorkflowProviderScheduleRequest) returns (BoundWorkflowSchedule);

  rpc UpsertEventTrigger(UpsertWorkflowProviderEventTriggerRequest) returns (BoundWorkflowEventTrigger);
  rpc GetEventTrigger(GetWorkflowProviderEventTriggerRequest) returns (BoundWorkflowEventTrigger);
  rpc ListEventTriggers(ListWorkflowProviderEventTriggersRequest) returns (ListWorkflowProviderEventTriggersResponse);
  rpc DeleteEventTrigger(DeleteWorkflowProviderEventTriggerRequest) returns (google.protobuf.Empty);
  rpc PauseEventTrigger(PauseWorkflowProviderEventTriggerRequest) returns (BoundWorkflowEventTrigger);
  rpc ResumeEventTrigger(ResumeWorkflowProviderEventTriggerRequest) returns (BoundWorkflowEventTrigger);

  rpc PublishEvent(PublishWorkflowProviderEventRequest) returns (google.protobuf.Empty);
}

service WorkflowHost {
  rpc InvokeOperation(InvokeWorkflowOperationRequest) returns (InvokeWorkflowOperationResponse);
}
