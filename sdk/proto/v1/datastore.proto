syntax = "proto3";

package gestalt.plugin.v1;

option go_package = "github.com/valon-technologies/gestalt/sdk/go/gen/v1;proto";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

message StoredUser {
  string id = 1;
  string email = 2;
  string display_name = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message StoredIntegrationToken {
  string id = 1;
  string user_id = 2;
  string integration = 3;
  string connection = 4;
  string instance = 5;
  bytes access_token_sealed = 6;
  bytes refresh_token_sealed = 7;
  string scopes = 8;
  google.protobuf.Timestamp expires_at = 9;
  google.protobuf.Timestamp last_refreshed_at = 10;
  int32 refresh_error_count = 11;
  map<string, string> connection_params = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message StoredAPIToken {
  string id = 1;
  string user_id = 2;
  string name = 3;
  string hashed_token = 4;
  string scopes = 5;
  google.protobuf.Timestamp expires_at = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message OAuthRegistration {
  string auth_server_url = 1;
  string redirect_uri = 2;
  string client_id = 3;
  bytes client_secret_sealed = 4;
  google.protobuf.Timestamp expires_at = 5;
  string authorization_endpoint = 6;
  string token_endpoint = 7;
  string scopes_supported = 8;
  google.protobuf.Timestamp discovered_at = 9;
}

message GetUserRequest {
  string id = 1;
}

message FindOrCreateUserRequest {
  string email = 1;
}

message GetStoredIntegrationTokenRequest {
  string user_id = 1;
  string integration = 2;
  string connection = 3;
  string instance = 4;
}

message ListStoredIntegrationTokensRequest {
  string user_id = 1;
  string integration = 2;
  string connection = 3;
}

message ListStoredIntegrationTokensResponse {
  repeated StoredIntegrationToken tokens = 1;
}

message DeleteStoredIntegrationTokenRequest {
  string id = 1;
}

message GetAPITokenByHashRequest {
  string hashed_token = 1;
}

message ListAPITokensRequest {
  string user_id = 1;
}

message ListAPITokensResponse {
  repeated StoredAPIToken tokens = 1;
}

message RevokeAPITokenRequest {
  string user_id = 1;
  string id = 2;
}

message RevokeAllAPITokensRequest {
  string user_id = 1;
}

message RevokeAllAPITokensResponse {
  int64 revoked = 1;
}

message GetOAuthRegistrationRequest {
  string auth_server_url = 1;
  string redirect_uri = 2;
}

message DeleteOAuthRegistrationRequest {
  string auth_server_url = 1;
  string redirect_uri = 2;
}

service DatastoreProvider {
  rpc Migrate(google.protobuf.Empty) returns (google.protobuf.Empty);
  rpc GetUser(GetUserRequest) returns (StoredUser);
  rpc FindOrCreateUser(FindOrCreateUserRequest) returns (StoredUser);
  rpc PutStoredIntegrationToken(StoredIntegrationToken) returns (google.protobuf.Empty);
  rpc GetStoredIntegrationToken(GetStoredIntegrationTokenRequest) returns (StoredIntegrationToken);
  rpc ListStoredIntegrationTokens(ListStoredIntegrationTokensRequest) returns (ListStoredIntegrationTokensResponse);
  rpc DeleteStoredIntegrationToken(DeleteStoredIntegrationTokenRequest) returns (google.protobuf.Empty);
  rpc PutAPIToken(StoredAPIToken) returns (google.protobuf.Empty);
  rpc GetAPITokenByHash(GetAPITokenByHashRequest) returns (StoredAPIToken);
  rpc ListAPITokens(ListAPITokensRequest) returns (ListAPITokensResponse);
  rpc RevokeAPIToken(RevokeAPITokenRequest) returns (google.protobuf.Empty);
  rpc RevokeAllAPITokens(RevokeAllAPITokensRequest) returns (RevokeAllAPITokensResponse);
  rpc GetOAuthRegistration(GetOAuthRegistrationRequest) returns (OAuthRegistration);
  rpc PutOAuthRegistration(OAuthRegistration) returns (google.protobuf.Empty);
  rpc DeleteOAuthRegistration(DeleteOAuthRegistrationRequest) returns (google.protobuf.Empty);
}
