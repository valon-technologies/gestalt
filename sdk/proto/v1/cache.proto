syntax = "proto3";

package gestalt.provider.v1;

option go_package = "github.com/valon-technologies/gestalt/sdk/go/gen/v1;proto";

import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";

message CacheSetEntry {
  string key = 1;
  bytes value = 2;
}

message CacheResult {
  string key = 1;
  bool found = 2;
  bytes value = 3;
}

message CacheGetRequest {
  string key = 1;
}

message CacheGetResponse {
  bool found = 1;
  bytes value = 2;
}

message CacheGetManyRequest {
  repeated string keys = 1;
}

message CacheGetManyResponse {
  repeated CacheResult entries = 1;
}

message CacheSetRequest {
  string key = 1;
  bytes value = 2;
  google.protobuf.Duration ttl = 3;
}

message CacheSetManyRequest {
  repeated CacheSetEntry entries = 1;
  google.protobuf.Duration ttl = 2;
}

message CacheDeleteRequest {
  string key = 1;
}

message CacheDeleteResponse {
  bool deleted = 1;
}

message CacheDeleteManyRequest {
  repeated string keys = 1;
}

message CacheDeleteManyResponse {
  int64 deleted = 1;
}

message CacheTouchRequest {
  string key = 1;
  google.protobuf.Duration ttl = 2;
}

message CacheTouchResponse {
  bool touched = 1;
}

service Cache {
  rpc Get(CacheGetRequest) returns (CacheGetResponse);
  rpc GetMany(CacheGetManyRequest) returns (CacheGetManyResponse);
  rpc Set(CacheSetRequest) returns (google.protobuf.Empty);
  rpc SetMany(CacheSetManyRequest) returns (google.protobuf.Empty);
  rpc Delete(CacheDeleteRequest) returns (CacheDeleteResponse);
  rpc DeleteMany(CacheDeleteManyRequest) returns (CacheDeleteManyResponse);
  rpc Touch(CacheTouchRequest) returns (CacheTouchResponse);
}
