syntax = "proto3";

package gestalt.provider.v1;

// SDK Naming Convention (all languages):
//   Base provider interface:  Provider
//   Authentication provider:  AuthenticationProvider
//   Authorization provider:   AuthorizationProvider
//   External credential provider: ExternalCredentialProvider
//   IndexedDB provider:       IndexedDBProvider
//   Lifecycle service:        ProviderLifecycle (internal, not user-facing)

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/valon-technologies/gestalt/sdk/go/gen/v1;proto";

enum ProviderKind {
  PROVIDER_KIND_UNSPECIFIED = 0;
  PROVIDER_KIND_INTEGRATION = 1;
  PROVIDER_KIND_AUTHENTICATION = 2;
  PROVIDER_KIND_INDEXEDDB = 3;
  PROVIDER_KIND_SECRETS = 4;
  PROVIDER_KIND_TELEMETRY = 5;
  PROVIDER_KIND_CACHE = 6;
  PROVIDER_KIND_S3 = 7;
  PROVIDER_KIND_WORKFLOW = 8;
  PROVIDER_KIND_AUTHORIZATION = 9;
  PROVIDER_KIND_RUNTIME = 10;
  PROVIDER_KIND_AGENT = 11;
  PROVIDER_KIND_EXTERNAL_CREDENTIAL = 12;
}

// ProviderIdentity describes a provider surface and the protocol versions it
// supports.
message ProviderIdentity {
  ProviderKind kind = 1;
  string name = 2;
  string display_name = 3;
  string description = 4;
  string version = 5;
  repeated string warnings = 6;
  int32 min_protocol_version = 10;
  int32 max_protocol_version = 11;
}

// ConfigureProviderRequest configures a non-integration provider for one
// runtime session.
message ConfigureProviderRequest {
  string name = 1;
  google.protobuf.Struct config = 2;
  int32 protocol_version = 3;
}

// ConfigureProviderResponse confirms the protocol version the provider is
// serving.
message ConfigureProviderResponse {
  int32 protocol_version = 1;
}

// HealthCheckResponse reports runtime readiness for a provider surface.
message HealthCheckResponse {
  bool ready = 1;
  string message = 2;
}

// ProviderLifecycle is the common lifecycle protocol shared by every provider
// kind.
service ProviderLifecycle {
  rpc GetProviderIdentity(google.protobuf.Empty) returns (ProviderIdentity);
  rpc ConfigureProvider(ConfigureProviderRequest) returns (ConfigureProviderResponse);
  rpc HealthCheck(google.protobuf.Empty) returns (HealthCheckResponse);
}
