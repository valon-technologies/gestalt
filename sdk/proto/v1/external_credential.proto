syntax = "proto3";

package gestalt.provider.v1;

option go_package = "github.com/valon-technologies/gestalt/internal/gen/v1;proto";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

message ExternalCredential {
  reserved 3, 4;
  reserved "integration", "connection";

  string id = 1;
  string subject_id = 2;
  string instance = 5;
  string access_token = 6;
  string refresh_token = 7;
  string scopes = 8;
  google.protobuf.Timestamp expires_at = 9;
  google.protobuf.Timestamp last_refreshed_at = 10;
  int32 refresh_error_count = 11;
  string metadata_json = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
  string connection_id = 15;
}

message ExternalCredentialLookup {
  reserved 2, 3;
  reserved "integration", "connection";

  string subject_id = 1;
  string instance = 4;
  string connection_id = 5;
}

message UpsertExternalCredentialRequest {
  ExternalCredential credential = 1;
  bool preserve_timestamps = 2;
}

message GetExternalCredentialRequest {
  ExternalCredentialLookup lookup = 1;
}

message ListExternalCredentialsRequest {
  reserved 2, 3;
  reserved "integration", "connection";

  string subject_id = 1;
  string instance = 4;
  string connection_id = 5;
}

message ListExternalCredentialsResponse {
  repeated ExternalCredential credentials = 1;
}

message DeleteExternalCredentialRequest {
  string id = 1;
}

message ExternalCredentialTokenExchangeDriver {
  string type = 1;
  string target_principal = 2;
  repeated string scopes = 3;
  int32 lifetime_seconds = 4;
  string endpoint = 5;
  map<string, string> params = 6;
}

message ExternalCredentialAuthConfig {
  string type = 1;
  string token = 2;
  string token_prefix = 3;
  string grant_type = 4;
  string token_url = 5;
  string client_id = 6;
  string client_secret = 7;
  string client_auth = 8;
  string token_exchange = 9;
  repeated string scopes = 10;
  string scope_param = 11;
  string scope_separator = 12;
  map<string, string> token_params = 13;
  map<string, string> refresh_params = 14;
  string accept_header = 15;
  string access_token_path = 16;
  repeated ExternalCredentialTokenExchangeDriver token_exchange_drivers = 17;
  string refresh_token = 18;
}

message ValidateExternalCredentialConfigRequest {
  string provider = 1;
  string connection = 2;
  string connection_id = 3;
  string mode = 4;
  ExternalCredentialAuthConfig auth = 5;
  map<string, string> connection_params = 6;
}

message ResolveExternalCredentialRequest {
  string provider = 1;
  string connection = 2;
  string connection_id = 3;
  string mode = 4;
  string credential_subject_id = 5;
  string actor_subject_id = 6;
  string instance = 7;
  ExternalCredentialAuthConfig auth = 8;
  map<string, string> connection_params = 9;
}

message ResolveExternalCredentialResponse {
  string token = 1;
  google.protobuf.Timestamp expires_at = 2;
  string metadata_json = 3;
  map<string, string> params = 4;
  ExternalCredential credential = 5;
}

message ExternalCredentialTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  int32 expires_in = 3;
  string token_type = 4;
  string extra_json = 5;
  string refresh_source = 6;
}

message ExchangeExternalCredentialRequest {
  string provider = 1;
  string connection = 2;
  string connection_id = 3;
  string credential_subject_id = 4;
  string actor_subject_id = 5;
  string instance = 6;
  ExternalCredentialAuthConfig auth = 7;
  string credential_json = 8;
  map<string, string> connection_params = 9;
}

message ExchangeExternalCredentialResponse {
  ExternalCredentialTokenResponse token_response = 1;
}

service ExternalCredentialProvider {
  rpc UpsertCredential(UpsertExternalCredentialRequest) returns (ExternalCredential);
  rpc GetCredential(GetExternalCredentialRequest) returns (ExternalCredential);
  rpc ListCredentials(ListExternalCredentialsRequest) returns (ListExternalCredentialsResponse);
  rpc DeleteCredential(DeleteExternalCredentialRequest) returns (google.protobuf.Empty);
  rpc ValidateCredentialConfig(ValidateExternalCredentialConfigRequest) returns (google.protobuf.Empty);
  rpc ResolveCredential(ResolveExternalCredentialRequest) returns (ResolveExternalCredentialResponse);
  rpc ExchangeCredential(ExchangeExternalCredentialRequest) returns (ExchangeExternalCredentialResponse);
}
