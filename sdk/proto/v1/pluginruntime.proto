syntax = "proto3";

package gestalt.provider.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "v1/agent.proto";

option go_package = "github.com/valon-technologies/gestalt/internal/gen/v1;proto";

enum PluginRuntimeEgressMode {
  PLUGIN_RUNTIME_EGRESS_MODE_UNSPECIFIED = 0;
  PLUGIN_RUNTIME_EGRESS_MODE_NONE = 1;
  PLUGIN_RUNTIME_EGRESS_MODE_CIDR = 2;
  PLUGIN_RUNTIME_EGRESS_MODE_HOSTNAME = 3;
}

message PluginRuntimeSupport {
  reserved 2, 4, 5, 6;
  reserved "host_service_access";
  bool can_host_plugins = 1;
  PluginRuntimeEgressMode egress_mode = 3;
  bool supports_prepare_workspace = 7;
}

message PluginRuntimeSession {
  string id = 1;
  string state = 2;
  map<string, string> metadata = 3;
  PluginRuntimeSessionLifecycle lifecycle = 4;
  string state_reason = 5;
  string state_message = 6;
}

message PluginRuntimeSessionLifecycle {
  google.protobuf.Timestamp started_at = 1;
  google.protobuf.Timestamp recommended_drain_at = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message PluginRuntimeImagePullAuth {
  string docker_config_json = 1;
}

message StartPluginRuntimeSessionRequest {
  reserved 5;
  reserved "image_pull_credentials";
  string plugin_name = 1;
  string template = 2;
  string image = 3;
  map<string, string> metadata = 4;
  PluginRuntimeImagePullAuth image_pull_auth = 6;
}

message GetPluginRuntimeSessionRequest {
  string session_id = 1;
}

message ListPluginRuntimeSessionsRequest {}

message ListPluginRuntimeSessionsResponse {
  repeated PluginRuntimeSession sessions = 1;
}

message StopPluginRuntimeSessionRequest {
  string session_id = 1;
}

message PreparePluginRuntimeWorkspaceRequest {
  string session_id = 1;
  string agent_session_id = 2;
  AgentWorkspace workspace = 3;
}

message PreparePluginRuntimeWorkspaceResponse {
  PreparedAgentWorkspace workspace = 1;
}

message RemovePluginRuntimeWorkspaceRequest {
  string session_id = 1;
  string agent_session_id = 2;
}

// StartHostedPluginRequest describes the plugin process to launch inside a
// runtime session. The runtime backend owns allocation and injection of the
// plugin's listener endpoint and returns a host-reachable dial target in the
// HostedPlugin response.
message StartHostedPluginRequest {
  reserved 6, 10;
  string session_id = 1;
  string plugin_name = 2;
  string command = 3;
  repeated string args = 4;
  map<string, string> env = 5;
  repeated string allowed_hosts = 7;
  string default_action = 8;
  string host_binary = 9;
}

message HostedPlugin {
  string id = 1;
  string session_id = 2;
  string plugin_name = 3;
  string dial_target = 4;
}

enum PluginRuntimeLogStream {
  PLUGIN_RUNTIME_LOG_STREAM_UNSPECIFIED = 0;
  PLUGIN_RUNTIME_LOG_STREAM_STDOUT = 1;
  PLUGIN_RUNTIME_LOG_STREAM_STDERR = 2;
  PLUGIN_RUNTIME_LOG_STREAM_RUNTIME = 3;
}

message PluginRuntimeLogEntry {
  PluginRuntimeLogStream stream = 1;
  string message = 2;
  google.protobuf.Timestamp observed_at = 3;
  int64 source_seq = 4;
}

message AppendPluginRuntimeLogsRequest {
  string session_id = 1;
  repeated PluginRuntimeLogEntry logs = 2;
}

message AppendPluginRuntimeLogsResponse {
  int64 last_seq = 1;
}

service PluginRuntimeLogHost {
  rpc AppendLogs(AppendPluginRuntimeLogsRequest) returns (AppendPluginRuntimeLogsResponse);
}

service PluginRuntimeProvider {
  rpc GetSupport(google.protobuf.Empty) returns (PluginRuntimeSupport);
  rpc StartSession(StartPluginRuntimeSessionRequest) returns (PluginRuntimeSession);
  rpc GetSession(GetPluginRuntimeSessionRequest) returns (PluginRuntimeSession);
  rpc ListSessions(ListPluginRuntimeSessionsRequest) returns (ListPluginRuntimeSessionsResponse);
  rpc StopSession(StopPluginRuntimeSessionRequest) returns (google.protobuf.Empty);
  rpc PrepareWorkspace(PreparePluginRuntimeWorkspaceRequest) returns (PreparePluginRuntimeWorkspaceResponse);
  rpc RemoveWorkspace(RemovePluginRuntimeWorkspaceRequest) returns (google.protobuf.Empty);
  rpc StartPlugin(StartHostedPluginRequest) returns (HostedPlugin);
}
