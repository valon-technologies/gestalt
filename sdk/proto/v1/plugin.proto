syntax = "proto3";

package gestalt.provider.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/valon-technologies/gestalt/sdk/go/gen/v1;proto";

// CatalogParameter describes one input parameter surfaced in the generated
// catalog for an operation.
message CatalogParameter {
  string name = 1;
  string type = 2;
  string description = 3;
  bool required = 4;
  google.protobuf.Value default = 5;
}

// OperationAnnotations carries optional host hints about how an operation
// behaves.
message OperationAnnotations {
  optional bool read_only_hint = 1;
  optional bool idempotent_hint = 2;
  optional bool destructive_hint = 3;
  optional bool open_world_hint = 4;
}

// CatalogOperation is one executable operation exposed by an integration
// provider.
message CatalogOperation {
  string id = 1;
  string method = 2;
  string title = 3;
  string description = 4;
  string input_schema = 5;
  string output_schema = 6;
  OperationAnnotations annotations = 7;
  repeated CatalogParameter parameters = 8;
  repeated string required_scopes = 9;
  repeated string tags = 10;
  bool read_only = 11;
  optional bool visible = 12;
  string transport = 13;
  repeated string allowed_roles = 14;
}

// Catalog is the static or request-scoped executable surface exposed by a
// provider.
message Catalog {
  string name = 1;
  string display_name = 2;
  string description = 3;
  string icon_svg = 4;
  repeated CatalogOperation operations = 5;
}

// ConnectionMode describes which credential sources a provider accepts.
enum ConnectionMode {
  CONNECTION_MODE_UNSPECIFIED = 0;
  CONNECTION_MODE_NONE = 1;
  CONNECTION_MODE_USER = 2;
  CONNECTION_MODE_PLATFORM = 5;
  reserved 3, 4;
  reserved "CONNECTION_MODE_IDENTITY", "CONNECTION_MODE_EITHER";
}

// ConnectionParamDef describes one provider-defined connection parameter.
message ConnectionParamDef {
  bool required = 1;
  string description = 2;
  string default_value = 3;
  string from = 4;
  string field = 5;
}

// ProviderMetadata describes an integration provider's static capabilities.
message ProviderMetadata {
  string name = 1;
  string display_name = 2;
  string description = 3;
  ConnectionMode connection_mode = 4;
  repeated string auth_types = 5;
  map<string, ConnectionParamDef> connection_params = 6;
  Catalog static_catalog = 7;
  bool supports_session_catalog = 8;
  bool supports_post_connect = 9;
  int32 min_protocol_version = 11;
  int32 max_protocol_version = 12;
}

// OperationResult is the serialized result returned from an Execute call.
message OperationResult {
  int32 status = 1;
  string body = 2;
}

// PluginInvocationGrant describes one plugin operation grant minted into an
// exchanged invocation token.
message PluginInvocationGrant {
  string plugin = 1;
  repeated string operations = 2;
  repeated string surfaces = 3;
  bool all_operations = 4;
}

// ExchangeInvocationTokenRequest narrows an existing invocation token to a
// child token that carries only the requested plugin grants.
message ExchangeInvocationTokenRequest {
  string parent_invocation_token = 1;
  repeated PluginInvocationGrant grants = 2;
  int64 ttl_seconds = 3;
}

// ExchangeInvocationTokenResponse returns the child invocation token.
message ExchangeInvocationTokenResponse {
  string invocation_token = 1;
}

// PluginInvokeRequest invokes a declared operation on another plugin through
// the host-side invoker service.
message PluginInvokeRequest {
  reserved 1;
  reserved "request_handle";
  string plugin = 2;
  string operation = 3;
  google.protobuf.Struct params = 4;
  string connection = 5;
  string instance = 6;
  string invocation_token = 7;
  string idempotency_key = 8;
}

// PluginInvokeGraphQLRequest invokes the raw GraphQL surface on another plugin
// through the host-side invoker service.
message PluginInvokeGraphQLRequest {
  string plugin = 1;
  string document = 2;
  google.protobuf.Struct variables = 3;
  string connection = 4;
  string instance = 5;
  string invocation_token = 6;
  string idempotency_key = 7;
}

// PostConnectCredential is the host-managed credential payload passed into
// post-connect hooks. Field numbers intentionally match the legacy
// post-connect credential payload so older compiled providers can still decode
// the request during rolling upgrades.
message PostConnectCredential {
  string id = 1;
  string subject_id = 2;
  string integration = 3;
  string instance = 4;
  string access_token = 5;
  string refresh_token = 6;
  string scopes = 7;
  google.protobuf.Timestamp expires_at = 8;
  google.protobuf.Timestamp last_refreshed_at = 9;
  int32 refresh_error_count = 10;
  string metadata_json = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
  string connection = 14;
}

// SubjectContext identifies the caller that initiated an operation.
message SubjectContext {
  string id = 1;
  string kind = 2;
  string display_name = 3;
  string auth_source = 4;
}

// StringList is a helper map value for repeated HTTP header and query values.
message StringList {
  repeated string values = 1;
}

// CredentialContext describes the resolved credential used for an operation.
message CredentialContext {
  string mode = 1;
  string subject_id = 2;
  string connection = 3;
  string instance = 4;
}

// AccessContext describes the host-side access decision for an operation.
message AccessContext {
  string policy = 1;
  string role = 2;
}

// RequestContext bundles the caller, credential, and access metadata for one
// operation.
message RequestContext {
  SubjectContext subject = 1;
  CredentialContext credential = 2;
  AccessContext access = 3;
  google.protobuf.Struct workflow = 4;
}

// HTTPSubjectRequest carries one verified hosted HTTP request into an optional
// plugin-local subject resolution hook.
message HTTPSubjectRequest {
  string binding = 1;
  string method = 2;
  string path = 3;
  string content_type = 4;
  map<string, StringList> headers = 5;
  map<string, StringList> query = 6;
  google.protobuf.Struct params = 7;
  bytes raw_body = 8;
  string security_scheme = 9;
  string verified_subject = 10;
  map<string, string> verified_claims = 11;
}

// ResolveHTTPSubjectRequest asks a provider to map a verified hosted HTTP
// request to a concrete Gestalt subject before normal operation authorization
// and dispatch.
message ResolveHTTPSubjectRequest {
  HTTPSubjectRequest request = 1;
  RequestContext context = 2;
}

// ResolveHTTPSubjectResponse returns the concrete Gestalt subject a hosted HTTP
// request should execute as. An unset subject means "fall back to the binding
// subject". When reject_status is set, the host should reject the inbound
// request with the provided status and message.
message ResolveHTTPSubjectResponse {
  SubjectContext subject = 1;
  int32 reject_status = 2;
  string reject_message = 3;
}

// ExecuteRequest invokes one executable operation.
message ExecuteRequest {
  string operation = 1;
  google.protobuf.Struct params = 2;
  string token = 3;
  map<string, string> connection_params = 4;
  string invocation_id = 5;
  RequestContext context = 6;
  reserved 7;
  reserved "request_handle";
  string invocation_token = 8;
  string idempotency_key = 9;
}

// GetSessionCatalogRequest asks a provider for request-scoped catalog
// extensions.
message GetSessionCatalogRequest {
  string token = 1;
  map<string, string> connection_params = 2;
  string invocation_id = 3;
  RequestContext context = 4;
}

// GetSessionCatalogResponse returns request-scoped catalog extensions.
message GetSessionCatalogResponse {
  Catalog catalog = 1;
}

// PostConnectRequest notifies a provider that a connection has completed.
message PostConnectRequest {
  PostConnectCredential token = 1;
}

// PostConnectResponse returns provider-defined metadata captured after
// connection.
message PostConnectResponse {
  map<string, string> metadata = 1;
}

// StartProviderRequest configures an integration provider for one runtime
// session.
message StartProviderRequest {
  string name = 1;
  google.protobuf.Struct config = 2;
  int32 protocol_version = 4;
}

// StartProviderResponse confirms the protocol version the provider is serving.
message StartProviderResponse {
  int32 protocol_version = 1;
}

// IntegrationProvider models the shared Gestalt integration-provider protocol.
service IntegrationProvider {
  rpc GetMetadata(google.protobuf.Empty) returns (ProviderMetadata);
  rpc StartProvider(StartProviderRequest) returns (StartProviderResponse);
  rpc Execute(ExecuteRequest) returns (OperationResult);
  rpc ResolveHTTPSubject(ResolveHTTPSubjectRequest) returns (ResolveHTTPSubjectResponse);
  rpc GetSessionCatalog(GetSessionCatalogRequest) returns (GetSessionCatalogResponse);
  rpc PostConnect(PostConnectRequest) returns (PostConnectResponse);
}

service PluginInvoker {
  rpc ExchangeInvocationToken(ExchangeInvocationTokenRequest) returns (ExchangeInvocationTokenResponse);
  rpc Invoke(PluginInvokeRequest) returns (OperationResult);
  rpc InvokeGraphQL(PluginInvokeGraphQLRequest) returns (OperationResult);
}
