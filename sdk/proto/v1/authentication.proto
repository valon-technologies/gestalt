syntax = "proto3";

package gestalt.provider.v1;

import "google/protobuf/empty.proto";

option go_package = "github.com/valon-technologies/gestalt/sdk/go/gen/v1;proto";

// AuthenticatedUser is the normalized user identity returned by an authentication
// provider after a login or token-validation flow.
message AuthenticatedUser {
  string subject = 1;
  string email = 2;
  bool email_verified = 3;
  string display_name = 4;
  string avatar_url = 5;
  map<string, string> claims = 6;
}

// BeginAuthenticationRequest starts an interactive authentication flow.
message BeginAuthenticationRequest {
  // callback_url is the host-managed URL the provider should redirect back to.
  string callback_url = 1;
  // host_state is opaque state generated by the host and echoed back on
  // completion.
  string host_state = 2;
  // scopes are the provider-specific scopes the host is requesting.
  repeated string scopes = 3;
  // options carries provider-specific login parameters.
  map<string, string> options = 4;
}

// BeginAuthenticationResponse returns the provider-managed authorization URL and
// opaque provider state that must be preserved until completion.
message BeginAuthenticationResponse {
  string authorization_url = 1;
  bytes provider_state = 2;
}

// CompleteAuthenticationRequest finishes an interactive authentication flow.
message CompleteAuthenticationRequest {
  // query contains the callback URL query parameters returned by the identity
  // provider.
  map<string, string> query = 1;
  // provider_state is the opaque state returned from BeginAuthenticationResponse.
  bytes provider_state = 2;
  // callback_url is the fully qualified callback URL used by the host.
  string callback_url = 3;
}

message TokenAuthInput {
  string token = 1;
}

message HTTPRequestAuthInput {
  string method = 1;
  string url = 2;
  map<string, string> headers = 3;
  map<string, string> query = 4;
}

// AuthenticateRequest asks the provider to validate an external authentication
// input, such as a bearer token or signed HTTP request.
message AuthenticateRequest {
  oneof input {
    TokenAuthInput token = 1;
    HTTPRequestAuthInput http = 2;
  }
  map<string, string> options = 10;
}

// Deprecated: use BeginAuthenticationRequest.
message BeginLoginRequest {
  string callback_url = 1;
  string host_state = 2;
  repeated string scopes = 3;
  map<string, string> options = 4;
}

// Deprecated: use BeginAuthenticationResponse.
message BeginLoginResponse {
  string authorization_url = 1;
  bytes provider_state = 2;
}

// Deprecated: use CompleteAuthenticationRequest.
message CompleteLoginRequest {
  map<string, string> query = 1;
  bytes provider_state = 2;
  string callback_url = 3;
}

// Deprecated: use AuthenticateRequest with token input.
message ValidateExternalTokenRequest {
  string token = 1;
}

// AuthSessionSettings configures how the host persists authenticated sessions.
message AuthSessionSettings {
  int64 session_ttl_seconds = 1;
}

// AuthenticationProvider models the shared Gestalt authentication-provider
// protocol.
service AuthenticationProvider {
  rpc BeginAuthentication(BeginAuthenticationRequest) returns (BeginAuthenticationResponse);
  rpc CompleteAuthentication(CompleteAuthenticationRequest) returns (AuthenticatedUser);
  rpc Authenticate(AuthenticateRequest) returns (AuthenticatedUser);

  // Deprecated: use BeginAuthentication.
  rpc BeginLogin(BeginLoginRequest) returns (BeginLoginResponse);
  // Deprecated: use CompleteAuthentication.
  rpc CompleteLogin(CompleteLoginRequest) returns (AuthenticatedUser);
  // Deprecated: use Authenticate.
  rpc ValidateExternalToken(ValidateExternalTokenRequest) returns (AuthenticatedUser);
  rpc GetSessionSettings(google.protobuf.Empty) returns (AuthSessionSettings);
}
