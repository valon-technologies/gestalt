[build-system]
requires = ["setuptools==82.0.1"]
build-backend = "setuptools.build_meta"

[project]
name = "gestalt"
version = "0.0.1-alpha.1"
description = "Python SDK for Gestalt executable provider plugins"
requires-python = ">=3.10"
dependencies = [
  "grpcio==1.80.0",
  "pyinstaller==6.19.0",
  "protobuf==7.34.1",
]

[tool.setuptools.packages.find]
include = ["gestalt*"]
