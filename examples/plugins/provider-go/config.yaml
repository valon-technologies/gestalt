auth:
  provider: google
  config:
    client_id: ${GOOGLE_CLIENT_ID}
    client_secret: ${GOOGLE_CLIENT_SECRET}

datastore:
  provider: sqlite
  config:
    path: ./example.db

server:
  encryption_key: dev-key-for-example-only

providers:
  example:
    from:
      source:
        path: ./plugin.yaml
    config:
      greeting: "Hello from example plugin"
