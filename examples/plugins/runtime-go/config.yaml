auth:
  provider: google
  config:
    client_id: ${GOOGLE_CLIENT_ID}
    client_secret: ${GOOGLE_CLIENT_SECRET}

datastore:
  provider: sqlite
  config:
    path: ./example.db

server:
  encryption_key: dev-key-for-example-only

integrations:
  example:
    plugin:
      command: ../provider-go/provider-go

runtimes:
  example_runtime:
    providers: [example]
    plugin:
      command: ./runtime-go
