server:
  port: 8080
  base_url: ${GESTALT_BASE_URL}
  encryption_key: ${ENCRYPTION_KEY}

auth:
  provider: google
  config:
    client_id: ${GOOGLE_CLIENT_ID}
    client_secret: ${GOOGLE_CLIENT_SECRET}

datastore:
  provider: sqlite
  config:
    path: /data/gestalt.db

integrations:
  myplugin:
    display_name: My Plugin
    plugin:
      package: ./plugins/myplugin.tar.gz
