source: github.com/valon-technologies/gestalt/datadog
version: 0.0.1-alpha.1
display_name: Datadog
description: Manage dashboards, monitors, incidents, logs, and RUM.
icon_file: assets/icon.svg
kinds:
  - provider
provider:
  openapi: openapi.yaml
  auth:
    type: manual
    credentials:
      - name: api_key
        label: API Key
        description: Datadog organization API key
        help_url: https://docs.datadoghq.com/account_management/api-app-keys/
      - name: app_key
        label: Application Key
        description: Datadog application key with the permissions you need
        help_url: https://docs.datadoghq.com/account_management/api-app-keys/
