source: github.com/valon-technologies/gestalt/datadog
version: 0.0.1-alpha.2
display_name: Datadog
description: Manage dashboards, monitors, incidents, logs, and RUM.
icon_file: assets/icon.svg
kinds:
  - provider
provider:
  openapi: openapi.yaml
  auth:
    type: manual
    credentials:
      - name: api_key
        label: API Key
        description: "Create one in [Datadog API Keys](https://docs.datadoghq.com/account_management/api-app-keys/)."
      - name: app_key
        label: Application Key
        description: "Create one in [Datadog Application Keys](https://docs.datadoghq.com/account_management/api-app-keys/)."
