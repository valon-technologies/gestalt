    directory: /gestaltd
    schedule:
      interval: daily
    commit-message:
      prefix: build

  - package-ecosystem: gomod
    directory: /sdk/go
    schedule:
      interval: daily
    commit-message:
      prefix: build

  - package-ecosystem: npm
    directory: /gestaltd/ui
    schedule:
      interval: daily
    commit-message:
      prefix: build

  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: daily
    commit-message:
      prefix: build

  - package-ecosystem: pip
