    schedule:
      interval: weekly
    commit-message:
      prefix: build

  - package-ecosystem: npm
    directory: /gestaltd/ui
    schedule:
      interval: weekly
    commit-message:
      prefix: build

  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
    commit-message:
      prefix: build
