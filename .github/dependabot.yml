version: 2
updates:
  - package-ecosystem: docker
    directory: /gestaltd
    schedule:
      interval: daily
    commit-message:
      prefix: build

  - package-ecosystem: docker
    directory: /gestalt
    schedule:
      interval: daily
    commit-message:
      prefix: build

  - package-ecosystem: docker
    directory: /docs
