name: Build Go SDK

on:
  push:
    branches:
      - main
    paths:
      - 'sdk/go/**'
      - 'sdk/proto/**'
      - '.github/workflows/build-go-sdk.yml'
  pull_request:
    paths:
      - 'sdk/go/**'
      - 'sdk/proto/**'
      - '.github/workflows/build-go-sdk.yml'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-sdk:
    name: Go SDK Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: sdk/go

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: sdk/go/go.mod
          cache-dependency-path: sdk/go/go.sum

      - name: Install Buf
        run: go install github.com/bufbuild/buf/cmd/buf@v1.66.1

      - name: Verify checked-in generated bindings
        run: |
          repo_root="$(git rev-parse --show-toplevel)"
          cd "$repo_root/sdk/proto"
          "$(go env GOPATH)/bin/buf" generate
          cd "$repo_root"
          git diff --exit-code -- sdk/go/gen/v1/*.pb.go sdk/go/gen/v1/*_grpc.pb.go

      - name: Run Go SDK checks
        run: go test ./...
