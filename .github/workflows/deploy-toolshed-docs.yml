name: Deploy Toolshed Docs

on:
  push:
    branches: [main]
    paths:
      - 'toolshed/docs/**'
      - '.github/workflows/deploy-toolshed-docs.yml'
  workflow_dispatch:

env:
  PROJECT_ID: REDACTED_GCP_PROJECT
  REGION: us-east4
  SERVICE: toolshed-docs
  IMAGE: us-east4-docker.pkg.dev/REDACTED_GCP_PROJECT/cloud-run-source-deploy/toolshed-docs

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-east4-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: toolshed/docs
          file: toolshed/docs/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Fetch IP allowlists from Secret Manager
        id: ip-ranges
        run: |
          echo "office=$(gcloud secrets versions access latest --secret=valon-office-ip-ranges --project=${{ env.PROJECT_ID }})" >> "$GITHUB_OUTPUT"
          echo "vpn=$(gcloud secrets versions access latest --secret=valon-vpn-ip-ranges --project=${{ env.PROJECT_ID }})" >> "$GITHUB_OUTPUT"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: toolshed/docs/terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: toolshed/docs/terraform
        run: |
          terraform apply -auto-approve \
            -var='docs_image=${{ env.IMAGE }}:${{ github.sha }}' \
            -var='valon_office_ip_ranges=${{ steps.ip-ranges.outputs.office }}' \
            -var='valon_vpn_ip_ranges=${{ steps.ip-ranges.outputs.vpn }}'
