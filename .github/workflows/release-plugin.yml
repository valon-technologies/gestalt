name: Release Plugin

on:
  push:
    tags:
      - 'plugin/*/v*'

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      plugin-name: ${{ steps.parse.outputs.plugin-name }}
      plugin-version: ${{ steps.parse.outputs.plugin-version }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          PLUGIN_NAME="${TAG#plugin/}"
          PLUGIN_NAME="${PLUGIN_NAME%%/*}"
          PLUGIN_VERSION="${TAG##*/v}"
          echo "plugin-name=${PLUGIN_NAME}" >> "$GITHUB_OUTPUT"
          echo "plugin-version=${PLUGIN_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Validate plugin directory
        env:
          PLUGIN_NAME: ${{ steps.parse.outputs.plugin-name }}
        run: |
          PLUGIN_DIR="plugins/${PLUGIN_NAME}"
          if [ ! -d "$PLUGIN_DIR" ]; then
            echo "ERROR: Plugin directory ${PLUGIN_DIR} does not exist"
            exit 1
          fi
          if [ ! -f "${PLUGIN_DIR}/plugin.yaml" ]; then
            echo "ERROR: ${PLUGIN_DIR}/plugin.yaml not found"
            exit 1
          fi

  package-plugin:
    name: Package Plugin
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLUGIN_NAME: ${{ needs.prepare.outputs.plugin-name }}
      PLUGIN_VERSION: ${{ needs.prepare.outputs.plugin-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache: false
      - name: Build gestaltd
        run: cd server && go build -o ../gestaltd ./cmd/gestaltd
      - uses: actions/setup-go@v5
        if: ${{ hashFiles(format('plugins/{0}/go.mod', needs.prepare.outputs.plugin-name)) != '' }}
        with:
          go-version-file: plugins/${{ env.PLUGIN_NAME }}/go.mod
          cache: false
      - name: Release plugin
        run: |
          cd "plugins/${PLUGIN_NAME}"
          ../../gestaltd plugin release --version "${PLUGIN_VERSION}"
      - uses: actions/upload-artifact@v4
        with:
          name: gestalt-plugin-${{ env.PLUGIN_NAME }}
          path: plugins/${{ env.PLUGIN_NAME }}/dist/*
          if-no-files-found: error

  release:
    name: Create Release
    needs: [prepare, package-plugin]
    if: needs.prepare.result == 'success' && needs.package-plugin.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: gestalt-plugin-*
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir release
          find artifacts -type f -exec mv {} release/ \;
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.plugin-version, '-alpha') || contains(needs.prepare.outputs.plugin-version, '-beta') || contains(needs.prepare.outputs.plugin-version, '-rc') }}
