name: Release Gestaltd

on:
  push:
    tags:
      - 'gestaltd/v*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    name: Build - ${{ matrix.platform.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS-ARM64
            goos: darwin
            goarch: arm64
            suffix: macos-arm64
          - name: macOS-x86_64
            goos: darwin
            goarch: amd64
            suffix: macos-x86_64
          - name: Linux-x86_64
            goos: linux
            goarch: amd64
            suffix: linux-x86_64
          - name: Linux-ARM64
            goos: linux
            goarch: arm64
            suffix: linux-arm64
          - name: Linux-ARMv7
            goos: linux
            goarch: arm
            goarm: '7'
            suffix: linux-armv7
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: gestaltd/go.mod
          cache-dependency-path: gestaltd/go.sum
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#gestaltd/v}" >> "$GITHUB_OUTPUT"
      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.platform.goos }}
          GOARCH: ${{ matrix.platform.goarch }}
          GOARM: ${{ matrix.platform.goarm }}
        run: |
          mkdir -p build
          (
            cd gestaltd
            go build \
              -ldflags "-X main.version=${{ steps.version.outputs.version }}" \
              -o ../build/gestaltd \
              ./cmd/gestaltd
          )
      - name: Package
        run: |
          mkdir -p dist
          tar -czvf dist/gestaltd-${{ matrix.platform.suffix }}.tar.gz -C build gestaltd
          shasum -a 256 dist/gestaltd-${{ matrix.platform.suffix }}.tar.gz > dist/gestaltd-${{ matrix.platform.suffix }}.tar.gz.sha256
      - name: Package Debian artifact
        if: ${{ startsWith(matrix.platform.suffix, 'linux-') }}
        run: |
          case "${{ matrix.platform.suffix }}" in
            linux-x86_64) deb_arch="amd64" ;;
            linux-arm64) deb_arch="arm64" ;;
            linux-armv7) deb_arch="armhf" ;;
            *)
              echo "unsupported Debian package target: ${{ matrix.platform.suffix }}" >&2
              exit 1
              ;;
          esac

          mkdir -p dist
          ./packaging/deb/build-gestaltd-deb.sh \
            --binary build/gestaltd \
            --version "${{ steps.version.outputs.version }}" \
            --arch "${deb_arch}" \
            --out-dir dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gestaltd-${{ matrix.platform.suffix }}
          path: |
            dist/gestaltd-${{ matrix.platform.suffix }}.tar.gz
            dist/gestaltd-${{ matrix.platform.suffix }}.tar.gz.sha256
            dist/gestaltd_*.deb
            dist/gestaltd_*.deb.sha256
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    uses: ./.github/workflows/publish-scoped-github-release.yml
    with:
      component-name: gestaltd
      version-prefix: 'gestaltd/v'
      tag-glob: 'gestaltd/v*'
      path-filters: |
        gestaltd
      component-summary: |
        Self-hosted integration gateway for Gestalt with the embedded client UI, admin UI, HTTP API, and optional MCP endpoint.
      install-markdown: |
        - Homebrew: `brew upgrade gestaltd`
        - Apt (Debian/Ubuntu): [APT install instructions](https://gestaltd.ai/install/apt)
        - Docker: `docker pull valontechnologies/gestaltd:${version}`
        - Docs: [Deployment guide](https://gestaltd.ai/deploy)
      exclude-subject-patterns: |
        ^Update gestaltd formula and chart to v
      download-artifact-pattern: 'gestaltd-*'

  publish-image:
    name: Publish Docker Image (static)
    needs: build
    uses: ./.github/workflows/publish-dockerhub-image.yml
    secrets: inherit
    with:
      image-name: valontechnologies/gestaltd
      image-url: https://hub.docker.com/r/valontechnologies/gestaltd
      dockerfile: gestaltd/Dockerfile
      version-prefix: 'gestaltd/v'
      short-description: Platform for self-hostable, configurable integrations and tooling
      readme-filepath: docs/dockerhub/gestaltd.md
      platforms: 'linux/amd64,linux/arm64,linux/arm/v7'
      target: static

  publish-image-alpine:
    name: Publish Docker Image (Alpine)
    needs: build
    uses: ./.github/workflows/publish-dockerhub-image.yml
    secrets: inherit
    with:
      image-name: valontechnologies/gestaltd
      image-url: https://hub.docker.com/r/valontechnologies/gestaltd
      dockerfile: gestaltd/Dockerfile
      version-prefix: 'gestaltd/v'
      short-description: Platform for self-hostable, configurable integrations and tooling
      readme-filepath: docs/dockerhub/gestaltd.md
      platforms: 'linux/amd64,linux/arm64,linux/arm/v7'
      tag-suffix: '-alpine'
      target: alpine

  update-formula:
    name: Update Homebrew Formula, Chart & OCI Publish
    needs: [release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#gestaltd/v}" >> "$GITHUB_OUTPUT"
      - name: Download SHA256 files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p checksums
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "gestaltd-*.sha256" \
            --dir checksums
      - name: Parse checksums
        id: checksums
        run: |
          for platform in macos-arm64 macos-x86_64 linux-arm64 linux-armv7 linux-x86_64; do
            hash=$(awk '{print $1}' "checksums/gestaltd-${platform}.tar.gz.sha256")
            echo "${platform}=${hash}" >> "$GITHUB_OUTPUT"
          done
      - name: Update formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ github.ref_name }}
          SHA_MACOS_ARM64: ${{ steps.checksums.outputs.macos-arm64 }}
          SHA_MACOS_X86: ${{ steps.checksums.outputs.macos-x86_64 }}
          SHA_LINUX_ARM64: ${{ steps.checksums.outputs.linux-arm64 }}
          SHA_LINUX_X86: ${{ steps.checksums.outputs.linux-x86_64 }}
        run: |
          FORMULA="Formula/gestaltd.rb"
          OLD_VERSION=$(grep '^\s*version ' "$FORMULA" | sed 's/.*version "\(.*\)"/\1/')
          sed -i "s/version \"${OLD_VERSION}\"/version \"${VERSION}\"/" "$FORMULA"
          perl -0pi -e 's{https://github.com/valon-technologies/gestalt/releases/download/[^"]+/gestaltd-macos-arm64\.tar\.gz}{https://github.com/valon-technologies/gestalt/releases/download/'"$TAG"'/gestaltd-macos-arm64.tar.gz}g; s{https://github.com/valon-technologies/gestalt/releases/download/[^"]+/gestaltd-macos-x86_64\.tar\.gz}{https://github.com/valon-technologies/gestalt/releases/download/'"$TAG"'/gestaltd-macos-x86_64.tar.gz}g; s{https://github.com/valon-technologies/gestalt/releases/download/[^"]+/gestaltd-linux-arm64\.tar\.gz}{https://github.com/valon-technologies/gestalt/releases/download/'"$TAG"'/gestaltd-linux-arm64.tar.gz}g; s{https://github.com/valon-technologies/gestalt/releases/download/[^"]+/gestaltd-linux-x86_64\.tar\.gz}{https://github.com/valon-technologies/gestalt/releases/download/'"$TAG"'/gestaltd-linux-x86_64.tar.gz}g' "$FORMULA"
          awk -v sha_macos_arm64="$SHA_MACOS_ARM64" \
              -v sha_macos_x86="$SHA_MACOS_X86" \
              -v sha_linux_arm64="$SHA_LINUX_ARM64" \
              -v sha_linux_x86="$SHA_LINUX_X86" \
          '
          /gestaltd-macos-arm64\.tar\.gz/ { found="macos-arm64" }
          /gestaltd-macos-x86_64\.tar\.gz/ { found="macos-x86" }
          /gestaltd-linux-arm64\.tar\.gz/ { found="linux-arm64" }
          /gestaltd-linux-x86_64\.tar\.gz/ { found="linux-x86" }
          /sha256 "/ {
            if (found == "macos-arm64") { sub(/"[^"]*"/, "\"" sha_macos_arm64 "\"") }
            if (found == "macos-x86") { sub(/"[^"]*"/, "\"" sha_macos_x86 "\"") }
            if (found == "linux-arm64") { sub(/"[^"]*"/, "\"" sha_linux_arm64 "\"") }
            if (found == "linux-x86") { sub(/"[^"]*"/, "\"" sha_linux_x86 "\"") }
            found=""
          }
          { print }
          ' "$FORMULA" > "${FORMULA}.tmp" && mv "${FORMULA}.tmp" "$FORMULA"
      - name: Verify formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          grep -q "version \"${VERSION}\"" Formula/gestaltd.rb
          echo "Formula verified"
      - name: Update Helm chart version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          CHART="gestaltd/deploy/helm/gestalt/Chart.yaml"
          sed -i "s/^version:.*/version: ${VERSION}/" "$CHART"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" "$CHART"
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
      - name: Package and push Helm chart to GHCR
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          helm package gestaltd/deploy/helm/gestalt --destination /tmp/charts
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm push /tmp/charts/gestalt-${VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gestaltd.rb gestaltd/deploy/helm/gestalt/Chart.yaml
          git diff --cached --quiet && { echo "No changes"; exit 0; }
          git commit -m "Update gestaltd formula and chart to v${{ steps.version.outputs.version }}"
          git pull --rebase origin main
          git push
