name: Release Gestaltd

on:
  push:
    tags:
      - 'gestaltd/v*'

permissions:
  contents: write
  packages: write

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-assets
          path: web/out/
          if-no-files-found: error

  build:
    name: Build - ${{ matrix.platform.name }}
    needs: build-frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS-ARM64
            goos: darwin
            goarch: arm64
            suffix: macos-arm64
          - name: macOS-x86_64
            goos: darwin
            goarch: amd64
            suffix: macos-x86_64
          - name: Linux-x86_64
            goos: linux
            goarch: amd64
            suffix: linux-x86_64
          - name: Linux-ARM64
            goos: linux
            goarch: arm64
            suffix: linux-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - uses: actions/download-artifact@v4
        with:
          name: frontend-assets
          path: server/internal/webui/out/
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#gestaltd/v}" >> "$GITHUB_OUTPUT"
      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.platform.goos }}
          GOARCH: ${{ matrix.platform.goarch }}
        run: |
          cd server && go build \
            -ldflags "-X main.version=${{ steps.version.outputs.version }}" \
            -o ../gestaltd \
            ./cmd/gestaltd
      - name: Package
        run: |
          tar -czvf gestaltd-${{ matrix.platform.suffix }}.tar.gz gestaltd
          shasum -a 256 gestaltd-${{ matrix.platform.suffix }}.tar.gz > gestaltd-${{ matrix.platform.suffix }}.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: gestaltd-${{ matrix.platform.suffix }}
          path: |
            gestaltd-${{ matrix.platform.suffix }}.tar.gz
            gestaltd-${{ matrix.platform.suffix }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Attach to Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) -exec mv {} release/ \;
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}

  publish-image:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      IMAGE_NAME: valontechnologies/gestaltd
      IMAGE_SOURCE: https://github.com/${{ github.repository }}
      IMAGE_DOCUMENTATION: https://docs.valon.tools
      IMAGE_URL: https://hub.docker.com/r/valontechnologies/gestaltd
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#gestaltd/v}" >> "$GITHUB_OUTPUT"
      - name: Compute image metadata
        id: meta
        run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            GESTALT_VERSION=${{ steps.version.outputs.version }}
            GESTALT_REVISION=${{ github.sha }}
            GESTALT_CREATED=${{ steps.meta.outputs.created }}
            GESTALT_SOURCE=${{ env.IMAGE_SOURCE }}
            GESTALT_DOCUMENTATION=${{ env.IMAGE_DOCUMENTATION }}
            GESTALT_URL=${{ env.IMAGE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          sbom: true
          provenance: mode=max
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_DESCRIPTION_USERNAME }}
          password: ${{ secrets.DOCKERHUB_DESCRIPTION_PASSWORD }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: Self-hosted integration runtime for REST, GraphQL, MCP, and plugins.
          readme-filepath: docs/dockerhub/gestaltd.md

  update-formula:
    name: Update Homebrew Formula, Chart & OCI Publish
    needs: [release, publish-image]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PAT_TOKEN }}
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#gestaltd/v}" >> "$GITHUB_OUTPUT"
      - name: Download SHA256 files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p checksums
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "gestaltd-*.sha256" \
            --dir checksums
      - name: Parse checksums
        id: checksums
        run: |
          for platform in macos-arm64 macos-x86_64 linux-arm64 linux-x86_64; do
            hash=$(awk '{print $1}' "checksums/gestaltd-${platform}.tar.gz.sha256")
            echo "${platform}=${hash}" >> "$GITHUB_OUTPUT"
          done
      - name: Update formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ github.ref_name }}
          SHA_MACOS_ARM64: ${{ steps.checksums.outputs.macos-arm64 }}
          SHA_MACOS_X86: ${{ steps.checksums.outputs.macos-x86_64 }}
          SHA_LINUX_ARM64: ${{ steps.checksums.outputs.linux-arm64 }}
          SHA_LINUX_X86: ${{ steps.checksums.outputs.linux-x86_64 }}
        run: |
          FORMULA="Formula/gestaltd.rb"
          OLD_VERSION=$(grep '^\s*version ' "$FORMULA" | sed 's/.*version "\(.*\)"/\1/')
          sed -i "s/version \"${OLD_VERSION}\"/version \"${VERSION}\"/" "$FORMULA"
          perl -0pi -e 's{https://github.com/valon-technologies/gestalt/releases/download/[^"]+/gestaltd-macos-arm64\.tar\.gz}{https://github.com/valon-technologies/gestalt/releases/download/'"$TAG"'/gestaltd-macos-arm64.tar.gz}g; s{https://github.com/valon-technologies/gestalt/releases/download/[^"]+/gestaltd-macos-x86_64\.tar\.gz}{https://github.com/valon-technologies/gestalt/releases/download/'"$TAG"'/gestaltd-macos-x86_64.tar.gz}g; s{https://github.com/valon-technologies/gestalt/releases/download/[^"]+/gestaltd-linux-arm64\.tar\.gz}{https://github.com/valon-technologies/gestalt/releases/download/'"$TAG"'/gestaltd-linux-arm64.tar.gz}g; s{https://github.com/valon-technologies/gestalt/releases/download/[^"]+/gestaltd-linux-x86_64\.tar\.gz}{https://github.com/valon-technologies/gestalt/releases/download/'"$TAG"'/gestaltd-linux-x86_64.tar.gz}g' "$FORMULA"
          awk -v sha_macos_arm64="$SHA_MACOS_ARM64" \
              -v sha_macos_x86="$SHA_MACOS_X86" \
              -v sha_linux_arm64="$SHA_LINUX_ARM64" \
              -v sha_linux_x86="$SHA_LINUX_X86" \
          '
          /gestaltd-macos-arm64\.tar\.gz/ { found="macos-arm64" }
          /gestaltd-macos-x86_64\.tar\.gz/ { found="macos-x86" }
          /gestaltd-linux-arm64\.tar\.gz/ { found="linux-arm64" }
          /gestaltd-linux-x86_64\.tar\.gz/ { found="linux-x86" }
          /sha256 "/ {
            if (found == "macos-arm64") { sub(/"[^"]*"/, "\"" sha_macos_arm64 "\"") }
            if (found == "macos-x86") { sub(/"[^"]*"/, "\"" sha_macos_x86 "\"") }
            if (found == "linux-arm64") { sub(/"[^"]*"/, "\"" sha_linux_arm64 "\"") }
            if (found == "linux-x86") { sub(/"[^"]*"/, "\"" sha_linux_x86 "\"") }
            found=""
          }
          { print }
          ' "$FORMULA" > "${FORMULA}.tmp" && mv "${FORMULA}.tmp" "$FORMULA"
      - name: Verify formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          grep -q "version \"${VERSION}\"" Formula/gestaltd.rb
          echo "Formula verified"
      - name: Update Helm chart version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          CHART="server/deploy/helm/gestalt/Chart.yaml"
          sed -i "s/^version:.*/version: ${VERSION}/" "$CHART"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" "$CHART"
      - uses: azure/setup-helm@v4
      - name: Package and push Helm chart to GHCR
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          helm package server/deploy/helm/gestalt --destination /tmp/charts
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm push /tmp/charts/gestalt-${VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gestaltd.rb server/deploy/helm/gestalt/Chart.yaml
          git diff --cached --quiet && { echo "No changes"; exit 0; }
          git commit -m "Update gestaltd formula and chart to v${{ steps.version.outputs.version }}"
          git pull --rebase origin main
          git push
