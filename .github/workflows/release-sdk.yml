name: Release SDK

on:
  push:
    tags:
      - 'sdk/pluginsdk/v*'

permissions:
  contents: write

jobs:
  release-pluginsdk:
    name: Release pluginsdk
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SDK_MODULE: github.com/valon-technologies/gestalt/sdk/pluginsdk
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: sdk/pluginsdk/go.mod
          cache-dependency-path: sdk/pluginsdk/go.sum
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#sdk/pluginsdk/v}" >> "$GITHUB_OUTPUT"
      - name: Warm Go module proxy cache
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          GOPROXY=proxy.golang.org go list -m "${SDK_MODULE}@v${VERSION}" || true
