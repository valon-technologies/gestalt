name: Release SDK

on:
  push:
    tags:
      - 'sdk/go/v*'
      - 'sdk/python/v*'
      - 'sdk/rust/v*'
      - 'sdk/typescript/v*'

permissions:
  contents: write

jobs:
  validate-go-sdk:
    if: ${{ startsWith(github.ref_name, 'sdk/go/v') }}
    name: Validate Go SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: sdk/go/go.mod
          cache-dependency-path: sdk/go/go.sum
      - name: Run Go SDK tests
        run: go test ./...

  release-go-sdk:
    if: ${{ startsWith(github.ref_name, 'sdk/go/v') }}
    name: Publish Release
    needs: validate-go-sdk
    uses: ./.github/workflows/publish-scoped-github-release.yml
    with:
      component-name: Gestalt Go SDK
      version-prefix: 'sdk/go/v'
      tag-glob: 'sdk/go/v*'
      path-filters: |
        sdk/go
        sdk/proto
      component-summary: |
        Go SDK for building against Gestalt's plugin and protocol surfaces, including the generated protobuf types used by the server and plugins.
      install-markdown: |
        - Go modules: `go get github.com/valon-technologies/gestalt/sdk/go@v${version}`
        - Package docs: [pkg.go.dev/github.com/valon-technologies/gestalt/sdk/go](https://pkg.go.dev/github.com/valon-technologies/gestalt/sdk/go)

  warm-go-sdk-module-proxy:
    if: ${{ startsWith(github.ref_name, 'sdk/go/v') }}
    name: Warm Go Module Proxy
    needs: release-go-sdk
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SDK_MODULE: github.com/valon-technologies/gestalt/sdk/go
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: sdk/go/go.mod
          cache-dependency-path: sdk/go/go.sum
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#sdk/go/v}" >> "$GITHUB_OUTPUT"
      - name: Warm Go module proxy cache
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          GOPROXY=proxy.golang.org go list -m "${SDK_MODULE}@v${VERSION}" || true

  validate-rust-sdk:
    if: ${{ startsWith(github.ref_name, 'sdk/rust/v') }}
    name: Validate Rust SDK
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: sdk/rust
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            sdk/rust/target/
          key: ${{ runner.os }}-cargo-rust-sdk-${{ hashFiles('sdk/rust/Cargo.toml', 'sdk/rust/Cargo.lock', 'sdk/rust/**/Cargo.toml', 'tools/rust-sdk-codegen/Cargo.toml', 'tools/rust-sdk-codegen/Cargo.lock') }}
      - name: Verify checked-in generated bindings
        run: |
          ./scripts/generate_stubs.sh
          git diff --exit-code -- src/generated/gestalt.provider.v1.rs
      - name: Check formatting
        run: cargo fmt --check
      - name: Run tests
        run: cargo test
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  publish-rust-sdk:
    if: ${{ startsWith(github.ref_name, 'sdk/rust/v') }}
    name: Publish Rust SDK
    needs: validate-rust-sdk
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: sdk/rust
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            sdk/rust/target/
          key: ${{ runner.os }}-cargo-rust-sdk-${{ hashFiles('sdk/rust/Cargo.toml', 'sdk/rust/Cargo.lock', 'sdk/rust/**/Cargo.toml') }}

      - name: Normalize crate version from tag
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("Cargo.toml")
          data = path.read_text()
          version = os.environ["VERSION"].removeprefix("sdk/rust/v")
          updated, count = re.subn(
              r'(^\[package\]\n(?:(?!^\[).*\n)*?^version = ")[^"]+(")',
              rf"\g<1>{version}\2",
              data,
              count=1,
              flags=re.MULTILINE,
          )
          if count != 1:
              raise SystemExit("failed to update [package].version in Cargo.toml")
          path.write_text(updated)
          PY
        env:
          VERSION: ${{ github.ref_name }}

      - name: Verify published crate contents
        run: cargo publish --dry-run --allow-dirty

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "CARGO_REGISTRY_TOKEN must be configured" >&2
            exit 1
          fi

          cargo publish --allow-dirty

  release-rust-sdk:
    if: ${{ startsWith(github.ref_name, 'sdk/rust/v') }}
    name: Publish Release
    needs: publish-rust-sdk
    uses: ./.github/workflows/publish-scoped-github-release.yml
    with:
      component-name: Gestalt Rust SDK
      version-prefix: 'sdk/rust/v'
      tag-glob: 'sdk/rust/v*'
      path-filters: |
        sdk/rust
        sdk/proto
      component-summary: |
        Rust SDK for building Gestalt executable providers, including integration, auth, and datastore surfaces, against the shared protocol bindings in this repository.
      install-markdown: |
        - Crate: `cargo add gestalt-sdk`
        - In code, continue importing the library as `gestalt`
        - API docs: [docs.rs/gestalt-sdk/latest/gestalt](https://docs.rs/gestalt-sdk/latest/gestalt/)
        - Package page: [crates.io/crates/gestalt-sdk](https://crates.io/crates/gestalt-sdk)

  publish-python-sdk:
    if: ${{ startsWith(github.ref_name, 'sdk/python/v') }}
    name: Publish Python SDK
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/p/gestalt-sdk
    permissions:
      contents: read
      id-token: write
    env:
      UV_PYTHON: "3.14"
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install Python
        run: uv python install 3.14

      - name: Normalize package version from tag
        run: |
          python3 ../../.github/scripts/normalize-python-sdk-version.py \
            pyproject.toml \
            "${GITHUB_REF_NAME#sdk/python/v}"

      - name: Build distributions
        run: uv build

      - name: Smoke test built wheel
        run: |
          wheel="$(ls dist/*.whl)"
          uv run --with "$wheel" --no-project python -c "import gestalt"

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

  publish-typescript-sdk:
    if: ${{ startsWith(github.ref_name, 'sdk/typescript/v') }}
    name: Publish TypeScript SDK
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Determine publish metadata from tag
        id: version
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          version="${VERSION#sdk/typescript/v}"
          tag=latest
          case "$version" in
            *-alpha.*) tag=alpha ;;
            *-beta.*) tag=beta ;;
            *-rc.*) tag=rc ;;
          esac
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Normalize package version from tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("package.json")
          data = json.loads(path.read_text())
          data["version"] = os.environ["VERSION"]
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

      - name: Run SDK checks
        run: bun run check

      - name: Dry-run publish
        run: npm publish --dry-run --access public --tag "${{ steps.version.outputs.tag }}"

      - name: Publish package
        run: npm publish --access public --tag "${{ steps.version.outputs.tag }}"
