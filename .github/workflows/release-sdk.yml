name: Release SDK

on:
  push:
    tags:
      - 'sdk/go/v*'
      - 'sdk/python/v*'

permissions:
  contents: write

jobs:
  validate-go-sdk:
    if: ${{ startsWith(github.ref_name, 'sdk/go/v') }}
    name: Validate Go SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: sdk/go/go.mod
          cache-dependency-path: sdk/go/go.sum
      - name: Run Go SDK tests
        run: go test ./...

  release-go-sdk:
    if: ${{ startsWith(github.ref_name, 'sdk/go/v') }}
    name: Publish Release
    needs: validate-go-sdk
    uses: ./.github/workflows/publish-scoped-github-release.yml
    with:
      component-name: Gestalt Go SDK
      version-prefix: 'sdk/go/v'
      tag-glob: 'sdk/go/v*'
      path-filters: |
        sdk/go
        sdk/proto
      component-summary: |
        Go SDK for building against Gestalt's plugin and protocol surfaces, including the generated protobuf types used by the server and plugins.
      install-markdown: |
        - Go modules: `go get github.com/valon-technologies/gestalt/sdk/go@v${version}`
        - Package docs: [pkg.go.dev/github.com/valon-technologies/gestalt/sdk/go](https://pkg.go.dev/github.com/valon-technologies/gestalt/sdk/go)

  warm-go-sdk-module-proxy:
    if: ${{ startsWith(github.ref_name, 'sdk/go/v') }}
    name: Warm Go Module Proxy
    needs: release-go-sdk
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SDK_MODULE: github.com/valon-technologies/gestalt/sdk/go
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: sdk/go/go.mod
          cache-dependency-path: sdk/go/go.sum
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#sdk/go/v}" >> "$GITHUB_OUTPUT"
      - name: Warm Go module proxy cache
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          GOPROXY=proxy.golang.org go list -m "${SDK_MODULE}@v${VERSION}" || true

  publish-python-sdk:
    if: ${{ startsWith(github.ref_name, 'sdk/python/v') }}
    name: Publish Python SDK
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      UV_PYTHON: "3.14"
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install Python
        run: uv python install 3.14

      - name: Normalize package version from tag
        run: |
          python3 ../../.github/scripts/normalize-python-sdk-version.py \
            pyproject.toml \
            "${GITHUB_REF_NAME#sdk/python/v}"

      - name: Build distributions
        run: uv build

      - name: Smoke test built wheel
        run: |
          wheel="$(ls dist/*.whl)"
          uv run --with "$wheel" --no-project python -c "import gestalt"

      - name: Publish distributions
        env:
          GESTALT_PYTHON_PUBLISH_URL: ${{ secrets.GESTALT_PYTHON_PUBLISH_URL }}
          UV_PUBLISH_TOKEN: ${{ secrets.GESTALT_PYTHON_PUBLISH_TOKEN }}
          UV_PUBLISH_USERNAME: ${{ secrets.GESTALT_PYTHON_PUBLISH_USERNAME }}
          UV_PUBLISH_PASSWORD: ${{ secrets.GESTALT_PYTHON_PUBLISH_PASSWORD }}
        run: |
          if [ -z "${GESTALT_PYTHON_PUBLISH_URL}" ]; then
            echo "GESTALT_PYTHON_PUBLISH_URL must be configured" >&2
            exit 1
          fi

          if [ -z "${UV_PUBLISH_TOKEN}" ] && { [ -z "${UV_PUBLISH_USERNAME}" ] || [ -z "${UV_PUBLISH_PASSWORD}" ]; }; then
            echo "configure GESTALT_PYTHON_PUBLISH_TOKEN or GESTALT_PYTHON_PUBLISH_USERNAME and GESTALT_PYTHON_PUBLISH_PASSWORD" >&2
            exit 1
          fi

          uv publish --publish-url "${GESTALT_PYTHON_PUBLISH_URL}"
