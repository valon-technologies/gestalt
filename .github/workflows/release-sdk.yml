name: Release SDK

on:
  push:
    tags:
      - 'sdk/go/v*'
      - 'sdk/python/v*'

permissions:
  contents: write

jobs:
  validate-go-sdk:
    if: ${{ startsWith(github.ref_name, 'sdk/go/v') }}
    name: Validate Go SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: sdk/go/go.mod
          cache-dependency-path: sdk/go/go.sum
      - name: Run Go SDK tests
        run: go test ./...

  release-go-sdk:
    if: ${{ startsWith(github.ref_name, 'sdk/go/v') }}
    name: Publish Release
    needs: validate-go-sdk
    uses: ./.github/workflows/publish-scoped-github-release.yml
    with:
      component-name: Gestalt Go SDK
      version-prefix: 'sdk/go/v'
      tag-glob: 'sdk/go/v*'
      path-filters: |
        sdk/go
        sdk/proto
      component-summary: |
        Go SDK for building against Gestalt's plugin and protocol surfaces, including the generated protobuf types used by the server and plugins.
      install-markdown: |
        - Go modules: `go get github.com/valon-technologies/gestalt/sdk/go@v${version}`
        - Package docs: [pkg.go.dev/github.com/valon-technologies/gestalt/sdk/go](https://pkg.go.dev/github.com/valon-technologies/gestalt/sdk/go)

  warm-go-sdk-module-proxy:
    if: ${{ startsWith(github.ref_name, 'sdk/go/v') }}
    name: Warm Go Module Proxy
    needs: release-go-sdk
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SDK_MODULE: github.com/valon-technologies/gestalt/sdk/go
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: sdk/go/go.mod
          cache-dependency-path: sdk/go/go.sum
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#sdk/go/v}" >> "$GITHUB_OUTPUT"
      - name: Warm Go module proxy cache
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          GOPROXY=proxy.golang.org go list -m "${SDK_MODULE}@v${VERSION}" || true

  publish-python-sdk:
    if: ${{ startsWith(github.ref_name, 'sdk/python/v') }}
    name: Publish Python SDK
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      PYTHON_REPOSITORY: ${{ vars.GAR_PYTHON_REPOSITORY }}
      UV_PYTHON: "3.14"
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          token_format: access_token

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install Python
        run: uv python install 3.14

      - name: Normalize package version from tag
        run: |
          python3 ../../.github/scripts/normalize-python-sdk-version.py \
            pyproject.toml \
            "${GITHUB_REF_NAME#sdk/python/v}"

      - name: Build distributions
        run: uv build

      - name: Smoke test built wheel
        run: |
          wheel="$(ls dist/*.whl)"
          uv run --with "$wheel" --no-project python -c "import gestalt"

      - name: Publish distributions
        env:
          UV_PUBLISH_URL: https://${{ env.REGION }}-python.pkg.dev/${{ env.PROJECT_ID }}/${{ env.PYTHON_REPOSITORY }}/
          UV_PUBLISH_USERNAME: oauth2accesstoken
          UV_PUBLISH_PASSWORD: ${{ steps.gcp-auth.outputs.access_token }}
        run: |
          if [ -z "${PROJECT_ID}" ] || [ -z "${REGION}" ] || [ -z "${PYTHON_REPOSITORY}" ]; then
            echo "GCP_PROJECT_ID, GCP_REGION, and GAR_PYTHON_REPOSITORY must be configured" >&2
            exit 1
          fi

          if [ -z "${UV_PUBLISH_PASSWORD}" ]; then
            echo "failed to mint Google access token for Artifact Registry" >&2
            exit 1
          fi

          uv publish
