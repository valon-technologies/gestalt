name: Release SDK

on:
  push:
    tags:
      - 'sdk/go/v*'

permissions:
  contents: write

jobs:
  validate-go-sdk:
    name: Validate Go SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: sdk/go/go.mod
          cache-dependency-path: sdk/go/go.sum
      - name: Install Buf
        working-directory: .
        run: |
          GOBIN="$RUNNER_TEMP/bin" go install github.com/bufbuild/buf/cmd/buf@v1.66.1
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Verify generated Go SDK stubs
        working-directory: .
        run: sdk/proto/check-go-sdk-sync.sh
      - name: Run Go SDK tests
        run: go test ./...

  release-go-sdk:
    name: Publish Release
    needs: validate-go-sdk
    uses: ./.github/workflows/publish-scoped-github-release.yml
    with:
      tag-glob: 'sdk/go/v*'
      path-filters: |
        sdk/go
        sdk/proto

  warm-go-sdk-module-proxy:
    name: Warm Go Module Proxy
    needs: release-go-sdk
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SDK_MODULE: github.com/valon-technologies/gestalt/sdk/go
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: sdk/go/go.mod
          cache-dependency-path: sdk/go/go.sum
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#sdk/go/v}" >> "$GITHUB_OUTPUT"
      - name: Warm Go module proxy cache
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          GOPROXY=proxy.golang.org go list -m "${SDK_MODULE}@v${VERSION}" || true
