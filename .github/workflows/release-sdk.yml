name: Release SDK

on:
  push:
    tags:
      - 'sdk/pluginapi/v*'

permissions:
  contents: write

jobs:
  release-pluginsdk:
    name: Release pluginsdk
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      API_MODULE: github.com/valon-technologies/gestalt/sdk/pluginapi
      SDK_MODULE: github.com/valon-technologies/gestalt/sdk/pluginsdk
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: sdk/pluginsdk/go.mod
          cache-dependency-path: sdk/pluginsdk/go.sum
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#sdk/pluginapi/v}" >> "$GITHUB_OUTPUT"
      - name: Pin pluginsdk to released pluginapi
        env:
          GOPRIVATE: github.com/valon-technologies/gestalt
          GONOSUMCHECK: github.com/valon-technologies/gestalt/*
        run: |
          cd sdk/pluginsdk
          go mod edit -dropreplace="${API_MODULE}"
          go mod edit -require="${API_MODULE}@v${{ steps.version.outputs.version }}"
          go mod tidy
      - name: Commit, tag, and push pluginsdk
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sdk/pluginsdk/go.mod sdk/pluginsdk/go.sum
          git commit -m "sdk/pluginsdk: pin pluginapi v${{ steps.version.outputs.version }} for release"
          git tag "sdk/pluginsdk/v${{ steps.version.outputs.version }}"
          git push origin "sdk/pluginsdk/v${{ steps.version.outputs.version }}"
      - name: Warm Go module proxy cache
        run: |
          GOPROXY=proxy.golang.org go list -m "${API_MODULE}@v${{ steps.version.outputs.version }}" || true
          GOPROXY=proxy.golang.org go list -m "${SDK_MODULE}@v${{ steps.version.outputs.version }}" || true
