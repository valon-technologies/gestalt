name: Release Python SDK

on:
  push:
    tags:
      - 'sdk/python/v*'

permissions:
  contents: read

jobs:
  publish-python-sdk:
    name: Publish Python SDK
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      UV_PYTHON: "3.12"
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install Python
        run: uv python install 3.12

      - name: Normalize package version from tag
        env:
          RAW_VERSION: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import re

          ref_name = os.environ["RAW_VERSION"]
          raw = ref_name.removeprefix("sdk/python/v")
          match = re.fullmatch(r"(\d+\.\d+\.\d+)(?:-(alpha|beta|rc)\.(\d+))?", raw)
          if match is None:
              raise SystemExit(f"unsupported Python SDK tag format: {raw}")

          base, phase, phase_num = match.groups()
          suffix = ""
          if phase is not None:
              suffix = {"alpha": "a", "beta": "b", "rc": "rc"}[phase] + phase_num
          pep440 = base + suffix

          path = pathlib.Path("pyproject.toml")
          data = path.read_text()
          updated, count = re.subn(
              r'^version = "[^"]+"$',
              f'version = "{pep440}"',
              data,
              count=1,
              flags=re.MULTILINE,
          )
          if count != 1:
              raise SystemExit("failed to update [project].version in pyproject.toml")
          path.write_text(updated)
          print(f"normalized {raw} -> {pep440}")
          PY

      - name: Build distributions
        run: uv build

      - name: Smoke test built wheel
        run: |
          wheel="$(ls dist/*.whl)"
          uv run --with "$wheel" --no-project python -c "import gestalt"

      - name: Publish distributions
        env:
          GESTALT_PYTHON_PUBLISH_URL: ${{ secrets.GESTALT_PYTHON_PUBLISH_URL }}
          UV_PUBLISH_TOKEN: ${{ secrets.GESTALT_PYTHON_PUBLISH_TOKEN }}
          UV_PUBLISH_USERNAME: ${{ secrets.GESTALT_PYTHON_PUBLISH_USERNAME }}
          UV_PUBLISH_PASSWORD: ${{ secrets.GESTALT_PYTHON_PUBLISH_PASSWORD }}
        run: |
          if [ -z "${GESTALT_PYTHON_PUBLISH_URL}" ]; then
            echo "GESTALT_PYTHON_PUBLISH_URL must be configured" >&2
            exit 1
          fi

          if [ -z "${UV_PUBLISH_TOKEN}" ] && { [ -z "${UV_PUBLISH_USERNAME}" ] || [ -z "${UV_PUBLISH_PASSWORD}" ]; }; then
            echo "configure GESTALT_PYTHON_PUBLISH_TOKEN or GESTALT_PYTHON_PUBLISH_USERNAME and GESTALT_PYTHON_PUBLISH_PASSWORD" >&2
            exit 1
          fi

          uv publish --publish-url "${GESTALT_PYTHON_PUBLISH_URL}"
