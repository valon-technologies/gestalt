name: Rust Build Matrix

on:
  workflow_call:
    inputs:
      package:
        description: 'Create tar.gz + sha256 packages'
        type: boolean
        default: false
      run-tests:
        description: 'Run tests on native targets'
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.platform.name }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS-ARM64
            runs-on: macos-latest
            target: aarch64-apple-darwin
            artifact: gestalt-macos-arm64
          - name: macOS-x86_64
            runs-on: macos-latest
            target: x86_64-apple-darwin
            artifact: gestalt-macos-x86_64
          - name: Linux-x86_64
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: gestalt-linux-x86_64
          - name: Linux-ARM64
            runs-on: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: gestalt-linux-arm64
            cross: true

    runs-on: ${{ matrix.platform.runs-on }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            gestalt/client/target/
          key: ${{ runner.os }}-${{ matrix.platform.target }}-cargo-${{ hashFiles('gestalt/client/Cargo.lock') }}

      - name: Install cross-compilation tools
        if: matrix.platform.cross
        run: |
          command -v cross >/dev/null 2>&1 || cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.platform.cross }}
        working-directory: gestalt/client
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Build (cross)
        if: matrix.platform.cross
        working-directory: gestalt/client
        run: cross build --release --target ${{ matrix.platform.target }}

      - name: Run tests
        if: ${{ !matrix.platform.cross && inputs.run-tests }}
        working-directory: gestalt/client
        timeout-minutes: 5
        run: cargo test --release --target ${{ matrix.platform.target }}

      - name: Package binary
        if: ${{ inputs.package }}
        run: |
          mkdir -p dist
          cp gestalt/client/target/${{ matrix.platform.target }}/release/gestalt dist/
          cd dist
          tar -czvf ${{ matrix.platform.artifact }}.tar.gz gestalt
          shasum -a 256 ${{ matrix.platform.artifact }}.tar.gz > ${{ matrix.platform.artifact }}.tar.gz.sha256

      - name: Upload packaged artifact
        if: ${{ inputs.package }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact }}
          path: dist/${{ matrix.platform.artifact }}.tar.gz*
          if-no-files-found: error

      - name: Upload binary
        if: ${{ !inputs.package }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact }}
          path: gestalt/client/target/${{ matrix.platform.target }}/release/gestalt
          if-no-files-found: error
