name: Rust Build Matrix

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Cargo workspace directory'
        type: string
        default: 'gestalt/client'
      binary-name:
        description: 'Name of the compiled binary'
        type: string
        default: 'gestalt'
      artifact-prefix:
        description: 'Prefix for artifact names (e.g., gestalt)'
        type: string
        default: 'gestalt'
      package:
        description: 'Create tar.gz + sha256 packages'
        type: boolean
        default: false
      run-tests:
        description: 'Run tests on native targets'
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.platform.name }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS-ARM64
            runs-on: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
          - name: macOS-x86_64
            runs-on: macos-latest
            target: x86_64-apple-darwin
            suffix: macos-x86_64
          - name: Linux-x86_64
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
          - name: Linux-ARM64
            runs-on: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            cross: true
          - name: Windows-x86_64
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64
            windows: true

    runs-on: ${{ matrix.platform.runs-on }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.platform.target }}

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ${{ inputs.working-directory }}/target/
          key: ${{ runner.os }}-${{ matrix.platform.target }}-cargo-${{ inputs.artifact-prefix }}-${{ hashFiles(format('{0}/**/Cargo.toml', inputs.working-directory)) }}

      - name: Install cross-compilation tools
        if: matrix.platform.cross
        run: |
          command -v cross >/dev/null 2>&1 || cargo install cross --version 0.2.5

      - name: Build (native)
        if: ${{ !matrix.platform.cross }}
        working-directory: ${{ inputs.working-directory }}
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Build (cross)
        if: matrix.platform.cross
        working-directory: ${{ inputs.working-directory }}
        run: cross build --release --target ${{ matrix.platform.target }}

      - name: Run tests
        if: ${{ !matrix.platform.cross && inputs.run-tests }}
        working-directory: ${{ inputs.working-directory }}
        timeout-minutes: ${{ matrix.platform.windows && 15 || 5 }}
        run: cargo test --release --target ${{ matrix.platform.target }}

      - name: Package binary (Unix)
        if: ${{ inputs.package && !matrix.platform.windows }}
        run: |
          mkdir -p dist
          cp ${{ inputs.working-directory }}/target/${{ matrix.platform.target }}/release/${{ inputs.binary-name }} dist/
          cd dist
          tar -czvf ${{ inputs.artifact-prefix }}-${{ matrix.platform.suffix }}.tar.gz ${{ inputs.binary-name }}
          shasum -a 256 ${{ inputs.artifact-prefix }}-${{ matrix.platform.suffix }}.tar.gz > ${{ inputs.artifact-prefix }}-${{ matrix.platform.suffix }}.tar.gz.sha256

      - name: Package binary (Windows)
        if: ${{ inputs.package && matrix.platform.windows }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item ${{ inputs.working-directory }}/target/${{ matrix.platform.target }}/release/${{ inputs.binary-name }}.exe dist/
          Set-Location dist
          Compress-Archive -Path ${{ inputs.binary-name }}.exe -DestinationPath ${{ inputs.artifact-prefix }}-${{ matrix.platform.suffix }}.zip
          $hash = (Get-FileHash ${{ inputs.artifact-prefix }}-${{ matrix.platform.suffix }}.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ inputs.artifact-prefix }}-${{ matrix.platform.suffix }}.zip" | Out-File -Encoding ascii ${{ inputs.artifact-prefix }}-${{ matrix.platform.suffix }}.zip.sha256

      - name: Upload packaged artifact
        if: ${{ inputs.package }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact-prefix }}-${{ matrix.platform.suffix }}
          path: |
            dist/${{ inputs.artifact-prefix }}-${{ matrix.platform.suffix }}.tar.gz*
            dist/${{ inputs.artifact-prefix }}-${{ matrix.platform.suffix }}.zip*
          if-no-files-found: error

      - name: Upload binary (Unix)
        if: ${{ !inputs.package && !matrix.platform.windows }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact-prefix }}-${{ matrix.platform.suffix }}
          path: ${{ inputs.working-directory }}/target/${{ matrix.platform.target }}/release/${{ inputs.binary-name }}
          if-no-files-found: error

      - name: Upload binary (Windows)
        if: ${{ !inputs.package && matrix.platform.windows }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.artifact-prefix }}-${{ matrix.platform.suffix }}
          path: ${{ inputs.working-directory }}/target/${{ matrix.platform.target }}/release/${{ inputs.binary-name }}.exe
          if-no-files-found: error
