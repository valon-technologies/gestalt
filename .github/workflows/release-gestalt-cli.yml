name: Release Gestalt CLI

on:
  push:
    tags:
      - 'gestalt/v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    uses: ./.github/workflows/rust-build-matrix.yml
    with:
      working-directory: gestalt
      binary-name: gestalt
      artifact-prefix: gestalt
      run-tests: true
      package: true

  release:
    name: Publish Release
    needs: build
    uses: ./.github/workflows/publish-scoped-github-release.yml
    with:
      tag-glob: 'gestalt/v*'
      path-filters: |
        gestalt
      download-artifact-pattern: 'gestalt-*'

  publish-image:
    name: Publish Docker Image
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      REGISTRY_IMAGE: valontechnologies/gestalt
      IMAGE_SOURCE: https://github.com/${{ github.repository }}
      IMAGE_DOCUMENTATION: https://docs.valon.tools
      IMAGE_URL: https://hub.docker.com/r/valontechnologies/gestalt
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Download Linux artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: gestalt-linux-*
          path: dist
          merge-multiple: true
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#gestalt/v}" >> "$GITHUB_OUTPUT"
      - name: Compute image metadata
        id: meta
        run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Build and push image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: gestalt/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY_IMAGE }}:latest
          build-args: |
            GESTALT_VERSION=${{ steps.version.outputs.version }}
            GESTALT_REVISION=${{ github.sha }}
            GESTALT_CREATED=${{ steps.meta.outputs.created }}
            GESTALT_SOURCE=${{ env.IMAGE_SOURCE }}
            GESTALT_DOCUMENTATION=${{ env.IMAGE_DOCUMENTATION }}
            GESTALT_URL=${{ env.IMAGE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          sbom: true
          provenance: mode=max
      - name: Scan CLI image for vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.REGISTRY_IMAGE }}:${{ steps.version.outputs.version }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        with:
          username: ${{ secrets.DOCKERHUB_DESCRIPTION_USERNAME }}
          password: ${{ secrets.DOCKERHUB_DESCRIPTION_PASSWORD }}
          repository: ${{ env.REGISTRY_IMAGE }}
          short-description: CLI client for managing Gestalt integrations, authentication, and operations.
          readme-filepath: docs/dockerhub/gestalt.md

  update-formula:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          token: ${{ secrets.PAT_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#gestalt/v}" >> "$GITHUB_OUTPUT"

      - name: Download SHA256 files from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p checksums
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.sha256" \
            --dir checksums

      - name: Parse checksums
        id: checksums
        run: |
          for platform in macos-arm64 macos-x86_64 linux-arm64 linux-x86_64; do
            hash=$(awk '{print $1}' "checksums/gestalt-${platform}.tar.gz.sha256")
            echo "${platform}=${hash}" >> "$GITHUB_OUTPUT"
          done

      - name: Update formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ github.ref_name }}
          SHA_MACOS_ARM64: ${{ steps.checksums.outputs.macos-arm64 }}
          SHA_MACOS_X86: ${{ steps.checksums.outputs.macos-x86_64 }}
          SHA_LINUX_ARM64: ${{ steps.checksums.outputs.linux-arm64 }}
          SHA_LINUX_X86: ${{ steps.checksums.outputs.linux-x86_64 }}
        run: |
          FORMULA="Formula/gestalt.rb"
          OLD_VERSION=$(grep '^\s*version ' "$FORMULA" | sed 's/.*version "\(.*\)"/\1/')

          sed -i "s/version \"${OLD_VERSION}\"/version \"${VERSION}\"/" "$FORMULA"
          perl -0pi -e 's{https://github.com/valon-technologies/gestalt/releases/download/[^"]+/gestalt-macos-arm64\.tar\.gz}{https://github.com/valon-technologies/gestalt/releases/download/'"$TAG"'/gestalt-macos-arm64.tar.gz}g; s{https://github.com/valon-technologies/gestalt/releases/download/[^"]+/gestalt-macos-x86_64\.tar\.gz}{https://github.com/valon-technologies/gestalt/releases/download/'"$TAG"'/gestalt-macos-x86_64.tar.gz}g; s{https://github.com/valon-technologies/gestalt/releases/download/[^"]+/gestalt-linux-arm64\.tar\.gz}{https://github.com/valon-technologies/gestalt/releases/download/'"$TAG"'/gestalt-linux-arm64.tar.gz}g; s{https://github.com/valon-technologies/gestalt/releases/download/[^"]+/gestalt-linux-x86_64\.tar\.gz}{https://github.com/valon-technologies/gestalt/releases/download/'"$TAG"'/gestalt-linux-x86_64.tar.gz}g' "$FORMULA"

          # Update SHA256 for each platform by matching the URL above it
          awk -v sha_macos_arm64="$SHA_MACOS_ARM64" \
              -v sha_macos_x86="$SHA_MACOS_X86" \
              -v sha_linux_arm64="$SHA_LINUX_ARM64" \
              -v sha_linux_x86="$SHA_LINUX_X86" \
          '
          /gestalt-macos-arm64\.tar\.gz/ { found="macos-arm64" }
          /gestalt-macos-x86_64\.tar\.gz/ { found="macos-x86" }
          /gestalt-linux-arm64\.tar\.gz/ { found="linux-arm64" }
          /gestalt-linux-x86_64\.tar\.gz/ { found="linux-x86" }
          /sha256 "/ {
            if (found == "macos-arm64") { sub(/"[^"]*"/, "\"" sha_macos_arm64 "\"") }
            if (found == "macos-x86") { sub(/"[^"]*"/, "\"" sha_macos_x86 "\"") }
            if (found == "linux-arm64") { sub(/"[^"]*"/, "\"" sha_linux_arm64 "\"") }
            if (found == "linux-x86") { sub(/"[^"]*"/, "\"" sha_linux_x86 "\"") }
            found=""
          }
          { print }
          ' "$FORMULA" > "${FORMULA}.tmp" && mv "${FORMULA}.tmp" "$FORMULA"

      - name: Verify formula was updated
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "=== Updated formula ==="
          cat Formula/gestalt.rb
          echo ""
          echo "=== Verification ==="
          grep -q "version \"${VERSION}\"" Formula/gestalt.rb || { echo "ERROR: version not updated"; exit 1; }
          grep -q "PLACEHOLDER" Formula/gestalt.rb && { echo "ERROR: PLACEHOLDER still present"; exit 1; }
          echo "Formula verified successfully"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gestalt.rb
          git diff --cached --quiet && { echo "No formula changes to commit"; exit 0; }
          git commit -m "Update gestalt formula to v${{ steps.version.outputs.version }}"
          git pull --rebase origin main
          git push
