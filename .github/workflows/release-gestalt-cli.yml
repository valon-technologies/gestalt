name: Release Gestalt CLI

on:
  push:
    tags:
      - 'gestalt/v*'

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    uses: ./.github/workflows/rust-build-matrix.yml
    with:
      working-directory: gestalt
      binary-name: gestalt
      artifact-prefix: gestalt
      run-tests: true
      package: true

  release:
    name: Publish Release
    needs: build
    uses: ./.github/workflows/publish-scoped-github-release.yml
    with:
      component-name: gestalt CLI
      version-prefix: 'gestalt/v'
      tag-glob: 'gestalt/v*'
      path-filters: |
        gestalt
      component-summary: |
        Command-line client for authenticating with Gestalt, connecting integrations, invoking operations, and managing API tokens from the terminal.
      install-markdown: |
        - Homebrew: `brew upgrade gestalt`
        - Docker: `docker pull valontechnologies/gestalt:${version}`
        - Docs: [CLI reference](https://gestaltd.ai/reference/cli)
      exclude-subject-patterns: |
        ^Update gestalt formula to v
      download-artifact-pattern: 'gestalt-*'

  publish-image:
    name: Publish Docker Image
    needs: build
    uses: ./.github/workflows/publish-dockerhub-image.yml
    secrets: inherit
    with:
      image-name: valontechnologies/gestalt
      image-url: https://hub.docker.com/r/valontechnologies/gestalt
      dockerfile: gestalt/Dockerfile
      version-prefix: 'gestalt/v'
      short-description: CLI client for managing Gestalt integrations, authentication, and operations.
      readme-filepath: docs/dockerhub/gestalt.md
      download-artifact-pattern: 'gestalt-linux-*'
      platforms: 'linux/amd64,linux/arm64,linux/arm/v7'
      target: distroless

  update-formula:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#gestalt/v}" >> "$GITHUB_OUTPUT"

      - name: Download SHA256 files from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p checksums
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.sha256" \
            --dir checksums

      - name: Parse checksums
        id: checksums
        run: |
          {
            echo "macos_arm64=$(awk '{print $1}' checksums/gestalt-macos-arm64.tar.gz.sha256)"
            echo "macos_x86_64=$(awk '{print $1}' checksums/gestalt-macos-x86_64.tar.gz.sha256)"
            echo "linux_arm64=$(awk '{print $1}' checksums/gestalt-linux-arm64.tar.gz.sha256)"
            echo "linux_x86_64=$(awk '{print $1}' checksums/gestalt-linux-x86_64.tar.gz.sha256)"
          } >> "$GITHUB_OUTPUT"

      - name: Update formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ github.ref_name }}
          SHA_MACOS_ARM64: ${{ steps.checksums.outputs.macos_arm64 }}
          SHA_MACOS_X86_64: ${{ steps.checksums.outputs.macos_x86_64 }}
          SHA_LINUX_ARM64: ${{ steps.checksums.outputs.linux_arm64 }}
          SHA_LINUX_X86_64: ${{ steps.checksums.outputs.linux_x86_64 }}
        run: |
          FORMULA="Formula/gestalt.rb"
          OLD_VERSION=$(grep '^\s*version ' "$FORMULA" | sed 's/.*version "\(.*\)"/\1/')

          sed -i "s/version \"${OLD_VERSION}\"/version \"${VERSION}\"/" "$FORMULA"
          perl -0pi -e 's{https://github.com/valon-technologies/gestalt/releases/download/[^"]+/gestalt-macos-arm64\.tar\.gz}{https://github.com/valon-technologies/gestalt/releases/download/'"$TAG"'/gestalt-macos-arm64.tar.gz}g; s{https://github.com/valon-technologies/gestalt/releases/download/[^"]+/gestalt-macos-x86_64\.tar\.gz}{https://github.com/valon-technologies/gestalt/releases/download/'"$TAG"'/gestalt-macos-x86_64.tar.gz}g; s{https://github.com/valon-technologies/gestalt/releases/download/[^"]+/gestalt-linux-arm64(?:-musl)?\.tar\.gz}{https://github.com/valon-technologies/gestalt/releases/download/'"$TAG"'/gestalt-linux-arm64.tar.gz}g; s{https://github.com/valon-technologies/gestalt/releases/download/[^"]+/gestalt-linux-x86_64(?:-musl)?\.tar\.gz}{https://github.com/valon-technologies/gestalt/releases/download/'"$TAG"'/gestalt-linux-x86_64.tar.gz}g' "$FORMULA"

          # Update SHA256 for each platform by matching the URL above it
          awk -v sha_macos_arm64="$SHA_MACOS_ARM64" \
              -v sha_macos_x86_64="$SHA_MACOS_X86_64" \
              -v sha_linux_arm64="$SHA_LINUX_ARM64" \
              -v sha_linux_x86_64="$SHA_LINUX_X86_64" \
          '
          /gestalt-macos-arm64\.tar\.gz/ { found="macos-arm64" }
          /gestalt-macos-x86_64\.tar\.gz/ { found="macos-x86_64" }
          /gestalt-linux-arm64\.tar\.gz/ { found="linux-arm64" }
          /gestalt-linux-x86_64\.tar\.gz/ { found="linux-x86_64" }
          /sha256 "/ {
            if (found == "macos-arm64") { sub(/"[^"]*"/, "\"" sha_macos_arm64 "\"") }
            if (found == "macos-x86_64") { sub(/"[^"]*"/, "\"" sha_macos_x86_64 "\"") }
            if (found == "linux-arm64") { sub(/"[^"]*"/, "\"" sha_linux_arm64 "\"") }
            if (found == "linux-x86_64") { sub(/"[^"]*"/, "\"" sha_linux_x86_64 "\"") }
            found=""
          }
          { print }
          ' "$FORMULA" > "${FORMULA}.tmp" && mv "${FORMULA}.tmp" "$FORMULA"

      - name: Verify formula was updated
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "=== Updated formula ==="
          cat Formula/gestalt.rb
          echo ""
          echo "=== Verification ==="
          grep -q "version \"${VERSION}\"" Formula/gestalt.rb || { echo "ERROR: version not updated"; exit 1; }
          grep -q "PLACEHOLDER" Formula/gestalt.rb && { echo "ERROR: PLACEHOLDER still present"; exit 1; }
          echo "Formula verified successfully"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gestalt.rb
          git diff --cached --quiet && { echo "No formula changes to commit"; exit 0; }
          git commit -m "Update gestalt formula to v${{ steps.version.outputs.version }}"
          git pull --rebase origin main
          git push
