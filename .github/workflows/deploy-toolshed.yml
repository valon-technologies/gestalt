name: Deploy Toolshed to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'valon-tools/**'
      - 'toolshed/**'
      - '.github/workflows/deploy-toolshed.yml'
  workflow_dispatch:

env:
  PROJECT_ID: gitlab-peach-street
  REGION: us-east4
  API_SERVICE: toolshed-test
  WEB_SERVICE: toolshed-test-web
  API_IMAGE: us-east4-docker.pkg.dev/gitlab-peach-street/cloud-run-source-deploy/toolshed-test
  WEB_IMAGE: us-east4-docker.pkg.dev/gitlab-peach-street/cloud-run-source-deploy/toolshed-test-web

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: read
    outputs:
      api_url: ${{ steps.get-url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-east4-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: valon-tools/deploy/Dockerfile.cloudrun
          push: true
          tags: ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.API_SERVICE }} \
            --image=${{ env.API_IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=1 \
            --port=8080 \
            --set-secrets="\
          BASE_URL=toolshed-base-url:latest,\
          ENCRYPTION_KEY=gestalt-encryption-key:latest,\
          GOOGLE_CLIENT_ID=google-oauth-client-id:latest,\
          GOOGLE_CLIENT_SECRET=google-oauth-client-secret:latest,\
          SLACK_CLIENT_ID=slack-client-id:latest,\
          SLACK_CLIENT_SECRET=slack-client-secret:latest,\
          FIGMA_CLIENT_ID=gestalt-figma-client-id:latest,\
          FIGMA_CLIENT_SECRET=gestalt-figma-client-secret:latest,\
          PAGERDUTY_CLIENT_ID=pagerduty-client-id:latest,\
          PAGERDUTY_CLIENT_SECRET=pagerduty-client-secret:latest,\
          GITLAB_CLIENT_ID=gitlab-client-id:latest,\
          GITLAB_CLIENT_SECRET=gitlab-client-secret:latest,\
          NOTION_CLIENT_ID=notion-client-id:latest,\
          NOTION_CLIENT_SECRET=notion-client-secret:latest,\
          RAMP_CLIENT_ID=ramp-client-id:latest,\
          RAMP_CLIENT_SECRET=ramp-client-secret:latest"

      - name: Get API service URL
        id: get-url
        run: |
          url=$(gcloud run services describe ${{ env.API_SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "url=$url" >> "$GITHUB_OUTPUT"

  deploy-web:
    runs-on: ubuntu-latest
    needs: deploy-api
    permissions:
      contents: read
      id-token: write
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-east4-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: toolshed/web
          file: toolshed/web/Dockerfile
          push: true
          tags: ${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.WEB_SERVICE }} \
            --image=${{ env.WEB_IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=1 \
            --port=3000 \
            --set-env-vars=TOOLSHED_API_URL=${{ needs.deploy-api.outputs.api_url }}
