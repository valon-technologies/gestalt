name: Verify SDK Authoring

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "SDK version to verify (e.g. 0.0.0-alpha.1)"
        required: true
        type: string

jobs:
  verify:
    name: E2E SDK Authoring Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOPRIVATE: github.com/valon-technologies/gestalt
      GONOSUMCHECK: github.com/valon-technologies/gestalt/*

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Build gestaltd
        run: cd server && go build -o ../gestaltd ./cmd/gestaltd

      - name: Create external plugin module
        run: |
          mkdir -p /tmp/sdk-authoring-test
          cd /tmp/sdk-authoring-test
          go mod init external-test-plugin
          go get "github.com/valon-technologies/gestalt/sdk/pluginsdk@v${{ inputs.sdk_version }}"

          cat > main.go <<'GO'
          package main

          import (
          	"context"
          	"encoding/json"
          	"fmt"
          	"os"
          	"os/signal"
          	"syscall"

          	pluginsdk "github.com/valon-technologies/gestalt/sdk/pluginsdk"
          )

          type provider struct{ prefix string }

          func (p *provider) Name() string                                    { return "external" }
          func (p *provider) DisplayName() string                             { return "External Test" }
          func (p *provider) Description() string                             { return "" }
          func (p *provider) ConnectionMode() pluginsdk.ConnectionMode        { return pluginsdk.ConnectionModeNone }
          func (p *provider) Start(_ context.Context, _ string, cfg map[string]any) error {
          	if v, ok := cfg["prefix"].(string); ok {
          		p.prefix = v
          	}
          	return nil
          }

          func (p *provider) ListOperations() []pluginsdk.Operation {
          	return []pluginsdk.Operation{
          		{Name: "ping", Description: "Return pong", Method: "GET"},
          	}
          }

          func (p *provider) Execute(_ context.Context, op string, _ map[string]any, _ string) (*pluginsdk.OperationResult, error) {
          	if op == "ping" {
          		body, _ := json.Marshal(map[string]string{"pong": p.prefix + "ok"})
          		return &pluginsdk.OperationResult{Status: 200, Body: string(body)}, nil
          	}
          	return &pluginsdk.OperationResult{Status: 404, Body: `{"error":"not found"}`}, nil
          }

          func main() {
          	ctx, stop := signal.NotifyContext(context.Background(), syscall.SIGINT, syscall.SIGTERM)
          	defer stop()
          	if err := pluginsdk.ServeProvider(ctx, &provider{}); err != nil {
          		fmt.Fprintf(os.Stderr, "error: %v\n", err)
          		os.Exit(1)
          	}
          }
          GO

      - name: Build plugin
        run: |
          cd /tmp/sdk-authoring-test
          go mod tidy
          go build -o ./provider .

      - name: Package plugin
        run: ./gestaltd plugin package --binary /tmp/sdk-authoring-test/provider --id test/external --output /tmp/sdk-authoring-test/plugin.tar.gz

      - name: Write config and bundle
        run: |
          cat > /tmp/sdk-authoring-test/config.yaml <<CFG
          auth:
            provider: none
          datastore:
            provider: sqlite
            config:
              path: /tmp/sdk-authoring-test/gestalt.db
          secrets:
            provider: env
          server:
            port: 19300
            encryption_key: verify-external-key
          integrations:
            external:
              connection_mode: none
              plugin:
                package: /tmp/sdk-authoring-test/plugin.tar.gz
                config:
                  prefix: "verified:"
          CFG

          ./gestaltd bundle --config /tmp/sdk-authoring-test/config.yaml --output /tmp/sdk-authoring-test/bundle

      - name: Start gestaltd
        run: |
          ./gestaltd serve --locked --config /tmp/sdk-authoring-test/bundle/config.yaml &
          echo $! > /tmp/sdk-authoring-test/server.pid

      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:19300/health; then
              echo "healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Server did not become healthy within 30 seconds"
          exit 1

      - name: Wait for ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:19300/ready; then
              echo "ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Server did not become ready within 30 seconds"
          exit 1

      - name: Invoke plugin and verify response
        run: |
          RESPONSE=$(curl -s -X GET http://localhost:19300/api/v1/external/ping)
          echo "response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"verified:ok"'; then
            echo "PASS: external plugin authoring workflow verified"
          else
            echo "::error::Unexpected response from plugin"
            exit 1
          fi

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/sdk-authoring-test/server.pid ]; then
            kill "$(cat /tmp/sdk-authoring-test/server.pid)" 2>/dev/null || true
          fi
