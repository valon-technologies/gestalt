name: Publish Scoped GitHub Release

on:
  workflow_call:
    inputs:
      component-name:
        description: Display name used in the release title and body.
        required: true
        type: string
      version-prefix:
        description: Tag prefix to strip when rendering the release version.
        required: true
        type: string
      tag-glob:
        description: Tag glob used to find the previous release tag.
        required: true
        type: string
      path-filters:
        description: Newline-delimited path filters used to scope release notes.
        required: true
        type: string
      download-artifact-pattern:
        description: Optional artifact name pattern to download and attach to the release.
        required: false
        default: ''
        type: string
      component-summary:
        description: Optional summary paragraph shown near the top of the release body.
        required: false
        default: ''
        type: string
      install-markdown:
        description: Optional markdown block with install or upgrade guidance.
        required: false
        default: ''
        type: string
      exclude-subject-patterns:
        description: Optional newline-delimited regex patterns for commit subjects to omit from release notes.
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Download release artifacts
        if: ${{ inputs.download-artifact-pattern != '' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: ${{ inputs.download-artifact-pattern }}
          path: release
          merge-multiple: true
      - name: Compute release metadata
        id: meta
        run: |
          version="${GITHUB_REF_NAME#${{ inputs.version-prefix }}}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_name=${{ inputs.component-name }} ${version}" >> "$GITHUB_OUTPUT"
      - name: Generate scoped release notes
        env:
          COMPONENT_NAME: ${{ inputs.component-name }}
          COMPONENT_SUMMARY: ${{ inputs.component-summary }}
          EXCLUDE_SUBJECT_PATTERNS: ${{ inputs.exclude-subject-patterns }}
          INSTALL_MARKDOWN: ${{ inputs.install-markdown }}
          PATH_FILTERS: ${{ inputs.path-filters }}
          VERSION_PREFIX: ${{ inputs.version-prefix }}
        run: |
          python3 .github/scripts/generate-release-notes.py \
            "${{ inputs.tag-glob }}" \
            "${{ github.ref_name }}" \
            release-notes.md
      - name: Create GitHub Release with assets
        if: ${{ inputs.download-artifact-pattern != '' }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: release/*
          name: ${{ steps.meta.outputs.release_name }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
      - name: Create GitHub Release
        if: ${{ inputs.download-artifact-pattern == '' }}
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          name: ${{ steps.meta.outputs.release_name }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
