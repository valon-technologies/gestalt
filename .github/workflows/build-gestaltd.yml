name: Build Gestaltd

on:
  push:
    branches:
      - main
  pull_request:

  workflow_dispatch:

jobs:
  lint:
    name: Go Lint & Vet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: server

  test:
    name: Go Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run tests
        run: go test ./...

  coverage:
    name: Go Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: server/coverage.out
          fail_ci_if_error: false

  race:
    name: Go Race Tests
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run race tests
        run: go test -race ./...

  web-lint:
    name: Web Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: docs

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run build

  web-e2e:
    name: Web E2E Tests (Go Server)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Copy frontend assets
        run: rm -rf server/internal/webui/out && cp -r web/out server/internal/webui/out

      - name: Build Go server
        run: cd server && go build -o ../gestaltd ./cmd/gestaltd

      - name: Start Go server
        run: |
          ./gestaltd &
          ready=false
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health; then
              ready=true
              break
            fi
            sleep 0.5
          done
          if [ "$ready" != "true" ]; then
            echo "::error::Go server did not become ready within 15 seconds"
            exit 1
          fi

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: web

      - name: Run E2E tests against Go server
        run: npx playwright test
        working-directory: web
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:8080

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: gestalt-playwright-report
          path: web/playwright-report/
          retention-days: 7

  helm-validate:
    name: Helm Chart Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint server/deploy/helm/gestalt

      - name: Helm template
        run: |
          helm template test-release server/deploy/helm/gestalt \
            -f server/deploy/helm/gestalt/ci-values.yaml \
            > /tmp/rendered.yaml

      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Validate Kubernetes schemas
        run: kubeconform -strict -summary /tmp/rendered.yaml

      - name: Helm template (plugin-init)
        run: |
          helm template test-release server/deploy/helm/gestalt \
            -f server/deploy/helm/gestalt/ci-values-plugin-init.yaml \
            > /tmp/rendered-plugin-init.yaml

      - name: Validate Kubernetes schemas (plugin-init)
        run: kubeconform -strict -summary /tmp/rendered-plugin-init.yaml
