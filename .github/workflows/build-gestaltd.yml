name: Build Gestaltd

on:
  push:
    branches:
      - main
  pull_request:

  workflow_dispatch:

jobs:
  lint:
    name: Go Lint & Vet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: gestaltd

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: gestaltd/go.mod
          cache-dependency-path: gestaltd/go.sum

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.11.3
          working-directory: gestaltd

  test:
    name: Go Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: gestaltd

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: gestaltd/go.mod
          cache-dependency-path: gestaltd/go.sum

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Run tests
        run: go test ./...

  coverage:
    name: Go Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: gestaltd

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: gestaltd/go.mod
          cache-dependency-path: gestaltd/go.sum

      - name: Run coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: gestaltd/coverage.out
          fail_ci_if_error: false

  race:
    name: Go Race Tests
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: gestaltd

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: gestaltd/go.mod
          cache-dependency-path: gestaltd/go.sum

      - name: Run race tests
        run: go test -race ./...

  web-lint:
    name: Web Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: gestaltd/ui

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gestaltd/ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: docs

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run build

  web-e2e:
    name: Web E2E Tests (Go Server)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: gestaltd/go.mod
          cache-dependency-path: gestaltd/go.sum

      - name: Create local sqlite provider fixture
        run: |
          provider_dir="$GITHUB_WORKSPACE/gestalt-providers/datastore/sqlite"
          goos="$(go env GOOS)"
          goarch="$(go env GOARCH)"
          artifact_rel="artifacts/${goos}/${goarch}/datastore-provider"
          mkdir -p "$provider_dir"

          cat >"$provider_dir/go.mod" <<EOF
          module github.com/valon-technologies/gestalt-providers/datastore/sqlite

          go 1.26

          require github.com/valon-technologies/gestalt/sdk/go v0.0.0-00010101000000-000000000000

          replace github.com/valon-technologies/gestalt/sdk/go => $GITHUB_WORKSPACE/sdk/go
          EOF

          cat >"$provider_dir/datastore.go" <<'EOF'
          package sqlite

          import (
          	"context"
          	"time"

          	gestalt "github.com/valon-technologies/gestalt/sdk/go"
          )

          type Provider struct{}

          func New() *Provider { return &Provider{} }

          func (p *Provider) Configure(context.Context, string, map[string]any) error { return nil }

          func (p *Provider) Metadata() gestalt.ProviderMetadata {
          	return gestalt.ProviderMetadata{
          		Kind:        gestalt.ProviderKindDatastore,
          		Name:        "sqlite",
          		DisplayName: "SQLite",
          	}
          }

          func (p *Provider) Warnings() []string { return nil }
          func (p *Provider) HealthCheck(context.Context) error { return nil }
          func (p *Provider) Migrate(context.Context) error { return nil }

          func (p *Provider) GetUser(context.Context, string) (*gestalt.StoredUser, error) { return nil, nil }

          func (p *Provider) FindOrCreateUser(_ context.Context, email string) (*gestalt.StoredUser, error) {
          	now := time.Now().UTC()
          	return &gestalt.StoredUser{
          		ID:        email,
          		Email:     email,
          		CreatedAt: now,
          		UpdatedAt: now,
          	}, nil
          }

          func (p *Provider) PutIntegrationToken(context.Context, *gestalt.StoredIntegrationToken) error {
          	return nil
          }

          func (p *Provider) GetIntegrationToken(context.Context, string, string, string, string) (*gestalt.StoredIntegrationToken, error) {
          	return nil, nil
          }

          func (p *Provider) ListIntegrationTokens(context.Context, string, string, string) ([]*gestalt.StoredIntegrationToken, error) {
          	return nil, nil
          }

          func (p *Provider) DeleteIntegrationToken(context.Context, string) error { return nil }
          func (p *Provider) PutAPIToken(context.Context, *gestalt.StoredAPIToken) error { return nil }

          func (p *Provider) GetAPITokenByHash(context.Context, string) (*gestalt.StoredAPIToken, error) {
          	return nil, nil
          }

          func (p *Provider) ListAPITokens(context.Context, string) ([]*gestalt.StoredAPIToken, error) {
          	return nil, nil
          }

          func (p *Provider) RevokeAPIToken(context.Context, string, string) error { return nil }

          func (p *Provider) RevokeAllAPITokens(context.Context, string) (int64, error) {
          	return 0, nil
          }
          EOF

          mkdir -p "$provider_dir/cmd/datastore-provider"
          cat >"$provider_dir/cmd/datastore-provider/main.go" <<'EOF'
          package main

          import (
            "context"
            "fmt"
            "os"
            "os/signal"
            "syscall"

            componentpkg "github.com/valon-technologies/gestalt-providers/datastore/sqlite"
            gestalt "github.com/valon-technologies/gestalt/sdk/go"
          )

          func main() {
            ctx, stop := signal.NotifyContext(context.Background(), syscall.SIGINT, syscall.SIGTERM)
            defer stop()

            if err := gestalt.ServeDatastoreProvider(ctx, componentpkg.New()); err != nil {
              fmt.Fprintf(os.Stderr, "error: %v\n", err)
              os.Exit(1)
            }
          }
          EOF

          cat >"$provider_dir/plugin.yaml" <<'EOF'
          source: github.com/valon-technologies/gestalt-providers/datastore/sqlite
          version: 0.0.1-alpha.1
          display_name: SQLite
          description: Local CI sqlite datastore fixture
          datastore: {}
          artifacts:
            - os: __GOOS__
              arch: __GOARCH__
              path: __ARTIFACT_PATH__
          entrypoints:
            datastore:
              artifact_path: __ARTIFACT_PATH__
          EOF
          PROVIDER_DIR="$provider_dir" GOOS="$goos" GOARCH="$goarch" ARTIFACT_REL="$artifact_rel" python3 - <<'PY'
          import os
          import pathlib

          plugin_path = pathlib.Path(os.environ["PROVIDER_DIR"]) / "plugin.yaml"
          text = plugin_path.read_text()
          text = text.replace("__GOOS__", os.environ["GOOS"])
          text = text.replace("__GOARCH__", os.environ["GOARCH"])
          text = text.replace("__ARTIFACT_PATH__", os.environ["ARTIFACT_REL"])
          plugin_path.write_text(text)
          PY

          (
            cd "$provider_dir"
            go mod tidy
            mkdir -p "$(dirname "$artifact_rel")"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o "$artifact_rel" ./cmd/datastore-provider
          )

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gestaltd/ui/package-lock.json

      - name: Build frontend
        run: cd gestaltd/ui && npm ci && npm run build

      - name: Copy frontend assets
        run: rm -rf gestaltd/internal/webui/out && cp -r gestaltd/ui/out gestaltd/internal/webui/out

      - name: Build Go server
        run: |
          mkdir -p build
          (
            cd gestaltd
            go build -o ../build/gestaltd ./cmd/gestaltd
          )

      - name: Start Go server
        env:
          GESTALT_PROVIDERS_DIR: ${{ github.workspace }}/gestalt-providers
        run: |
          ./build/gestaltd >/tmp/gestaltd.log 2>&1 &
          server_pid=$!
          ready=false
          for i in $(seq 1 120); do
            if ! kill -0 "$server_pid" 2>/dev/null; then
              echo "::error::Go server exited before becoming ready"
              cat /tmp/gestaltd.log
              exit 1
            fi
            if curl -sf http://localhost:8080/health; then
              ready=true
              break
            fi
            sleep 0.5
          done
          if [ "$ready" != "true" ]; then
            echo "::error::Go server did not become ready within 60 seconds"
            cat /tmp/gestaltd.log
            exit 1
          fi

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: gestaltd/ui

      - name: Run E2E tests against Go server
        run: npx playwright test
        working-directory: gestaltd/ui
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:8080

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ !cancelled() }}
        with:
          name: gestalt-playwright-report
          path: gestaltd/ui/playwright-report/
          retention-days: 7

  helm-validate:
    name: Helm Chart Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Helm lint
        run: helm lint gestaltd/deploy/helm/gestalt

      - name: Helm template (default chart profile)
        run: |
          helm template test-release gestaltd/deploy/helm/gestalt \
            > /tmp/rendered-default.yaml

      - name: Helm template (ingress)
        run: |
          helm template test-release gestaltd/deploy/helm/gestalt \
            --set ingress.enabled=true \
            --set-string ingress.hosts[0].host=gestalt.example.com \
            --set-string ingress.hosts[0].paths[0].path=/gestalt \
            --set-string ingress.hosts[0].paths[0].pathType=Prefix \
            > /tmp/rendered-ingress.yaml

      - name: Helm template
        run: |
          helm template test-release gestaltd/deploy/helm/gestalt \
            -f gestaltd/deploy/helm/gestalt/ci-values.yaml \
            > /tmp/rendered.yaml

      - name: Install kubeconform
        run: |
          set -euo pipefail
          version="v0.7.0"
          archive="kubeconform-linux-amd64.tar.gz"
          checksum="c31518ddd122663b3f3aa874cfe8178cb0988de944f29c74a0b9260920d115d3"
          tmp_dir="$(mktemp -d)"
          archive_path="${tmp_dir}/${archive}"

          trap 'rm -rf "${tmp_dir}"' EXIT

          curl -fsSLo "${archive_path}" \
            "https://github.com/yannh/kubeconform/releases/download/${version}/${archive}"
          actual_checksum="$(sha256sum "${archive_path}" | awk '{print $1}')"
          if [ "${actual_checksum}" != "${checksum}" ]; then
            echo "Checksum mismatch for ${archive}: ${actual_checksum}" >&2
            exit 1
          fi
          tar xzf "${archive_path}" -C /usr/local/bin kubeconform

      - name: Validate Kubernetes schemas
        run: kubeconform -strict -summary /tmp/rendered.yaml

      - name: Validate Kubernetes schemas (default chart profile)
        run: kubeconform -strict -summary /tmp/rendered-default.yaml

      - name: Validate Kubernetes schemas (ingress)
        run: kubeconform -strict -summary /tmp/rendered-ingress.yaml

      - name: Helm template (plugin-init)
        run: |
          helm template test-release gestaltd/deploy/helm/gestalt \
            -f gestaltd/deploy/helm/gestalt/ci-values-plugin-init.yaml \
            > /tmp/rendered-plugin-init.yaml

      - name: Validate Kubernetes schemas (plugin-init)
        run: kubeconform -strict -summary /tmp/rendered-plugin-init.yaml
