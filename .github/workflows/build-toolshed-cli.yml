name: Build Toolshed CLI

on:
  push:
    branches:
      - main
    paths:
      - 'toolshed/client/**'
      - '.github/workflows/build-toolshed-cli.yml'
  pull_request:
    paths:
      - 'toolshed/client/**'

  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Rust Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: toolshed/client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            toolshed/client/target/
          key: ${{ runner.os }}-cargo-toolshed-cli-${{ hashFiles('toolshed/client/**/Cargo.toml') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  build:
    needs: lint
    uses: ./.github/workflows/rust-build-matrix.yml
    with:
      working-directory: toolshed/client
      binary-name: tshed
      artifact-prefix: tshed
      run-tests: true
      package: false
