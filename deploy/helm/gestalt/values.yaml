# These example values use SQLite with a single replica.
# Switch to Postgres or MySQL before scaling horizontally.
replicaCount: 1

image:
  repository: gestaltd
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  # Gestalt does not need Kubernetes API access.
  automount: false
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: gestalt.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: gestalt-tls
  #    hosts:
  #      - gestalt.local

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi

# Mounted as /etc/gestalt/config.yaml. The app expands ${ENV_VAR}
# placeholders at startup, so secrets can be injected via extraEnv.
config:
  server:
    port: 8080
    base_url: "${GESTALT_BASE_URL}"
    encryption_key: "${GESTALT_ENCRYPTION_KEY}"
    dev_mode: false
  auth:
    provider: google
    config:
      client_id: "${GOOGLE_CLIENT_ID}"
      client_secret: "${GOOGLE_CLIENT_SECRET}"
    # For OIDC (Okta, Azure AD, Auth0, Keycloak, Firebase, etc.):
    # provider: oidc
    # config:
    #   issuer_url: "${OIDC_ISSUER_URL}"
    #   client_id: "${OIDC_CLIENT_ID}"
    #   client_secret: "${OIDC_CLIENT_SECRET}"
    #   session_secret: "${GESTALT_SESSION_SECRET}"
    #   display_name: "Okta"
  datastore:
    # SQLite is appropriate for local development or single-instance
    # deployments with mounted persistent storage at /data.
    provider: sqlite
    config:
      path: /data/gestalt.db

# Extra environment variables for the container. These are required
# for the ${VAR} placeholders in the config above to resolve.
extraEnv: []
# - name: GESTALT_BASE_URL
#   value: "https://gestalt.example.com"
# - name: GESTALT_ENCRYPTION_KEY
#   valueFrom:
#     secretKeyRef:
#       name: gestalt-secrets
#       key: encryption-key
# --- Google provider ---
# - name: GOOGLE_CLIENT_ID
#   valueFrom:
#     secretKeyRef:
#       name: gestalt-secrets
#       key: google-client-id
# - name: GOOGLE_CLIENT_SECRET
#   valueFrom:
#     secretKeyRef:
#       name: gestalt-secrets
#       key: google-client-secret
# --- OIDC provider ---
# - name: OIDC_ISSUER_URL
#   value: "https://login.example.com"
# - name: OIDC_CLIENT_ID
#   valueFrom:
#     secretKeyRef:
#       name: gestalt-secrets
#       key: oidc-client-id
# - name: OIDC_CLIENT_SECRET
#   valueFrom:
#     secretKeyRef:
#       name: gestalt-secrets
#       key: oidc-client-secret

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5

nodeSelector: {}

tolerations: []

affinity: {}
