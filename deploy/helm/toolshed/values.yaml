# SQLite limits to single writer; increase for PostgreSQL.
replicaCount: 1

image:
  repository: toolshed
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  # Toolshed does not need Kubernetes API access.
  automount: false
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: toolshed.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: toolshed-tls
  #    hosts:
  #      - toolshed.local

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi

# Mounted as /etc/toolshed/config.yaml. The app expands ${ENV_VAR}
# placeholders at startup, so secrets can be injected via extraEnv.
config:
  server:
    port: 8080
    base_url: "${TOOLSHED_BASE_URL}"
    encryption_key: "${TOOLSHED_ENCRYPTION_KEY}"
    dev_mode: false
  auth:
    provider: "${TOOLSHED_AUTH_PROVIDER}"
    config: {}
  datastore:
    provider: sqlite
    config:
      path: /data/toolshed.db

# Extra environment variables for the container.
# ref: https://kubernetes.io/docs/tasks/inject-data-application/define-environment-variable-container/
extraEnv: []
# - name: TOOLSHED_ENCRYPTION_KEY
#   valueFrom:
#     secretKeyRef:
#       name: my-secrets
#       key: encryption-key

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5

nodeSelector: {}

tolerations: []

affinity: {}
