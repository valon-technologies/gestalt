auth:
  provider: google  # or "oidc" — see docs/auth.md
  config:
    client_id: dev-placeholder
    client_secret: dev-placeholder
    redirect_url: http://localhost:8080/auth/callback

datastore:
  provider: sqlite
  config:
    path: ./gestalt.dev.db

server:
  port: 8080
  dev_mode: true
  encryption_key: dev-encryption-key-not-for-production
