services:
  gestalt-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/docker/config.yaml:/etc/gestalt/config.yaml:ro
      - gestalt-data:/data
    env_file:
      - .env

  web:
    build:
      context: ./web
    ports:
      - "3000:3000"
    environment:
      GESTALT_API_URL: http://gestalt-server:8080
    depends_on:
      - gestalt-server

volumes:
  gestalt-data:
