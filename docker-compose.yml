services:
  toolshed:
    build:
      context: ..
      dockerfile: toolshed/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/docker/config.yaml:/etc/toolshed/config.yaml:ro
      - toolshed-data:/data
    env_file:
      - .env

  web:
    build:
      context: ./web
    ports:
      - "3000:3000"
    environment:
      TOOLSHED_API_URL: http://toolshed:8080
    depends_on:
      - toolshed

volumes:
  toolshed-data:
