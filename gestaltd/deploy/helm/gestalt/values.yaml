# The default chart profile is for local development or trusted internal
# clusters. It disables platform auth, uses the first-party relationaldb
# provider with a SQLite DSN, and keeps a single replica so the chart boots
# without extra secrets.
#
# Configure OAuth/OIDC, server.encryptionKey, and a networked datastore
# before using this chart in production.
replicaCount: 1

image:
  repository: valontechnologies/gestaltd
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  # Gestalt does not need Kubernetes API access.
  automount: false
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8080

managementService:
  enabled: false
  type: ClusterIP
  port: 9090
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: gestalt.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: gestalt-tls
  #    hosts:
  #      - gestalt.local

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi

# Mounted as /etc/gestalt/config.yaml. The app expands ${ENV_VAR}
# placeholders at startup, so secrets can be injected via extraEnv when
# you enable OAuth/OIDC or an external datastore below.
config:
  server:
    public:
      port: 8080
    # Configure a separate internal-only management listener for /admin and
    # /metrics. Keep the management service disabled unless you also expose a
    # matching internal Kubernetes Service below.
    # management:
    #   host: 0.0.0.0
    #   port: 9090
    # Dev-only default so the default chart profile can boot. Override this with
    # a secret value before production use.
    encryptionKey: "dev-only-insecure-key-change-me"
    # baseUrl is optional for the default local/dev profile.
    # Set it to your public HTTPS URL when auth callbacks or external
    # integrations need it.
    # baseUrl: "${GESTALT_BASE_URL}"
    providers:
      indexeddb: main
  providers:
    indexeddb:
      main:
        # SQLite is appropriate for local development or single-instance
        # deployments with mounted persistent storage at /data.
        source:
          ref: github.com/valon-technologies/gestalt-providers/indexeddb/relationaldb
          version: 0.0.1-alpha.2
        config:
          dsn: "sqlite:///data/gestalt.db"
    # Add providers.ui.<name> entries when you want to mount public static UI bundles.

# Extra environment variables for the container. These are only required
# when your config uses ${VAR} placeholders for auth, baseUrl, or
# external datastore settings.
extraEnv: []
# - name: GESTALT_BASE_URL
#   value: "https://gestalt.example.com"
# - name: GESTALT_ENCRYPTION_KEY
#   valueFrom:
#     secretKeyRef:
#       name: gestalt-secrets
#       key: encryption-key
# --- Google provider ---
# - name: GOOGLE_CLIENT_ID
#   valueFrom:
#     secretKeyRef:
#       name: gestalt-secrets
#       key: google-client-id
# - name: GOOGLE_CLIENT_SECRET
#   valueFrom:
#     secretKeyRef:
#       name: gestalt-secrets
#       key: google-client-secret
# --- OIDC provider ---
# - name: OIDC_ISSUER_URL
#   value: "https://login.example.com"
# - name: OIDC_CLIENT_ID
#   valueFrom:
#     secretKeyRef:
#       name: gestalt-secrets
#       key: oidc-client-id
# - name: OIDC_CLIENT_SECRET
#   valueFrom:
#     secretKeyRef:
#       name: gestalt-secrets
#       key: oidc-client-secret
# - name: OIDC_SESSION_SECRET
#   valueFrom:
#     secretKeyRef:
#       name: gestalt-secrets
#       key: oidc-session-secret

pluginInit:
  # Enable this when your config uses remote REST/GraphQL upstreams or
  # packaged plugins and you want the chart to prepare locked state for you.
  enabled: false

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5

nodeSelector: {}

tolerations: []

affinity: {}
