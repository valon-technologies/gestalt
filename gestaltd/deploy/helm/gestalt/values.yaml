# The default chart profile is for smoke tests, local development, or
# trusted internal clusters. It uses auth.provider=none, SQLite, and a
# single replica so the chart boots without extra secrets.
#
# Configure OAuth/OIDC, server.encryption_key, and a networked datastore
# before using this chart in production.
replicaCount: 1

image:
  repository: valontechnologies/gestaltd
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  # Gestalt does not need Kubernetes API access.
  automount: false
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: gestalt.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: gestalt-tls
  #    hosts:
  #      - gestalt.local

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi

# Mounted as /etc/gestalt/config.yaml. The app expands ${ENV_VAR}
# placeholders at startup, so secrets can be injected via extraEnv when
# you enable OAuth/OIDC or an external datastore below.
config:
  server:
    port: 8080
    # Dev-only default so the smoke profile can boot. Override this with
    # a secret value before production use.
    encryption_key: "dev-only-insecure-key-change-me"
    # base_url is optional for the default smoke/dev profile.
    # Set it to your public HTTPS URL when auth callbacks or external
    # integrations need it.
    # base_url: "${GESTALT_BASE_URL}"
  auth:
    provider: none
    config: {}
    # For Google OAuth:
    # provider: google
    # config:
    #   client_id: "${GOOGLE_CLIENT_ID}"
    #   client_secret: "${GOOGLE_CLIENT_SECRET}"
    #   # Optional. If omitted, Gestalt derives the callback from server.base_url.
    #   # redirect_url: "${GOOGLE_REDIRECT_URL}"
    # For OIDC (Okta, Azure AD, Auth0, Keycloak, Firebase, etc.):
    # provider: oidc
    # config:
    #   issuer_url: "${OIDC_ISSUER_URL}"
    #   client_id: "${OIDC_CLIENT_ID}"
    #   client_secret: "${OIDC_CLIENT_SECRET}"
    #   redirect_url: "${OIDC_REDIRECT_URL}"
    #   session_secret: "${OIDC_SESSION_SECRET}"
    #   display_name: "Okta"
  datastore:
    # SQLite is appropriate for local development or single-instance
    # deployments with mounted persistent storage at /data.
    provider: sqlite
    config:
      path: /data/gestalt.db

# Extra environment variables for the container. These are only required
# when your config uses ${VAR} placeholders for auth, base_url, or
# external datastore settings.
extraEnv: []
# - name: GESTALT_BASE_URL
#   value: "https://gestalt.example.com"
# - name: GESTALT_ENCRYPTION_KEY
#   valueFrom:
#     secretKeyRef:
#       name: gestalt-secrets
#       key: encryption-key
# --- Google provider ---
# - name: GOOGLE_CLIENT_ID
#   valueFrom:
#     secretKeyRef:
#       name: gestalt-secrets
#       key: google-client-id
# - name: GOOGLE_CLIENT_SECRET
#   valueFrom:
#     secretKeyRef:
#       name: gestalt-secrets
#       key: google-client-secret
# --- OIDC provider ---
# - name: OIDC_ISSUER_URL
#   value: "https://login.example.com"
# - name: OIDC_CLIENT_ID
#   valueFrom:
#     secretKeyRef:
#       name: gestalt-secrets
#       key: oidc-client-id
# - name: OIDC_CLIENT_SECRET
#   valueFrom:
#     secretKeyRef:
#       name: gestalt-secrets
#       key: oidc-client-secret
# - name: OIDC_SESSION_SECRET
#   valueFrom:
#     secretKeyRef:
#       name: gestalt-secrets
#       key: oidc-session-secret

pluginInit:
  # Enable this when your config uses remote REST/GraphQL upstreams or
  # packaged plugins and you want the chart to prepare locked state for you.
  enabled: false

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5

nodeSelector: {}

tolerations: []

affinity: {}
