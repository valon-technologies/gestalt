datastore:
  provider:
    source:
      ref: github.com/valon-technologies/gestalt-providers/datastore/sqlite
      version: 0.0.1-alpha.1
  config:
    path: ./example.db

server:
  encryptionKey: dev-key-for-example-only

plugins:
  example:
    provider:
      source:
        path: ./plugin.yaml
    config:
      greeting: "Hello from example plugin"
