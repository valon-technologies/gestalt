datastores:
  main:
    provider:
      source:
        ref: github.com/valon-technologies/gestalt-providers/indexeddb/relationaldb
        version: 0.0.1-alpha.2
    config:
      dsn: sqlite://./example.db

datastore: main

server:
  encryptionKey: dev-key-for-example-only

plugins:
  example:
    provider:
      source:
        path: ./plugin.yaml
    config:
      greeting: "Hello from example plugin"
